function renderTimelineMatrix(items, granularity){
  var cats = DATA.timelineCategories.filter(function(c){ return c.showInMatrix!==false; });
  var birthYear = familyBirthYear();
  var unitsPerYear = granularity==="month" ? 12 : 1;

  /* 横轴改成跟横向时间轴一样的连续时间比例尺——柱子严格按开始/结束时间定位和算宽度，
     不再是"一个格子一个点"，而是细长的条状，跟"工作"/"住所"那边的展示方式保持一致 */
  var metas = items.map(function(t){
    var startKey = timeUnitKey(t.date, granularity);
    var startNum = timeUnitNumeric(startKey);
    if(startNum===null) return null;
    var endKey = t.dateEnd ? timeUnitKey(t.dateEnd, granularity) : null;
    var endNum = endKey ? timeUnitNumeric(endKey) : null;
    return {t:t, startKey:startKey, startNum:startNum, endNum:endNum};
  }).filter(Boolean);
  if(!metas.length) return '';

  var allNums = [];
  metas.forEach(function(m){ allNums.push(m.startNum); if(m.endNum!==null) allNums.push(m.endNum); });
  var minNumeric = Math.min.apply(Math, allNums);
  var PAD_L = 40, ROW_H = 44, PAD_B = 46, BAR_H = 10;
  function toX(n){ return PAD_L + (n-minNumeric)*unitsPerYear*HZ_SPACING; }

  metas.forEach(function(m){
    var x1 = toX(m.startNum);
    var x2 = Math.max(toX(m.endNum!==null ? m.endNum : m.startNum), x1+14);
    m.x1 = x1; m.x2 = x2; m.width = x2-x1; m.lane = 0;
  });
  var maxX = PAD_L;
  metas.forEach(function(m){ maxX = Math.max(maxX, m.x2); });
  var chartW = maxX+40;

  /* 工作/学校跟各自专属板块一样，同一时间重叠的经历自动分两行（短的那段挤到上面那行）；
     其它类别（含住所，住所自己另有上下分区逻辑）维持单行 */
  var DUAL_LANE_CATS = {work:true, school:true};
  var byCat = {};
  metas.forEach(function(m){ var ck = m.t.category||"other"; (byCat[ck]=byCat[ck]||[]).push(m); });
  var catMaxLane = {};
  Object.keys(byCat).forEach(function(ck){
    catMaxLane[ck] = DUAL_LANE_CATS[ck] ? packLanesWithOverflow(byCat[ck]) : 0;
  });

  var catTop = {}, runningTop = 0, rowHeights = {};
  cats.forEach(function(c){
    rowHeights[c.key] = ((catMaxLane[c.key]||0)+1) * ROW_H;
    catTop[c.key] = runningTop;
    runningTop += rowHeights[c.key];
  });
  var chartH = runningTop;
  var catY = {}; cats.forEach(function(c){ catY[c.key] = catTop[c.key] + ROW_H/2; });

  /* 纵轴：类别标签，固定在左边不随横向滚动 */
  var yAxisLabels = cats.map(function(c){
    return '<div class="tla-ylabel" style="top:'+catTop[c.key]+'px; height:'+rowHeights[c.key]+'px; --cat-color:'+c.color+'" onclick="setTimelineFilter(\''+c.key+'\')" title="点击单独看这个类别">'+esc(c.label)+'</div>';
  }).join('');

  /* 横轴：按实际出现过的年份/年月刻度，用连续比例尺定位，带对应年纪（带随年纪变化的小图标），网格线 */
  var seenKeys = {}, xKeys = [];
  metas.forEach(function(m){ if(!seenKeys[m.startKey]){ seenKeys[m.startKey]=true; xKeys.push(m.startKey); } });
  xKeys.sort(function(a,b){ return timeUnitNumeric(a)-timeUnitNumeric(b); });
  var xAxisLabels = xKeys.map(function(yk){
    var x = toX(timeUnitNumeric(yk));
    var ageHtml = "";
    if(birthYear!==null){
      var y = parseInt(String(yk).split("-")[0],10);
      if(!isNaN(y) && y>=birthYear){ var age=y-birthYear; ageHtml = '<div class="tla-age">'+ageGrowthIcon(age)+' '+age+'岁</div>'; }
    }
    return '<div class="tla-xlabel" style="left:'+(x-48)+'px; width:96px">'+
      '<div class="tla-year">'+esc(timeUnitLabel(yk))+'</div>'+ageHtml+
    '</div>';
  }).join('');
  var vGrid = xKeys.map(function(yk){
    return '<div class="tla-vgrid" style="left:'+toX(timeUnitNumeric(yk))+'px; height:'+chartH+'px"></div>';
  }).join('');
  var hGrid = cats.map(function(c){ return '<div class="tla-hgrid" style="top:'+catTop[c.key]+'px; width:'+chartW+'px"></div>'; }).join('') +
    '<div class="tla-hgrid" style="top:'+chartH+'px; width:'+chartW+'px"></div>';
  /* "住所"这一行跟专属板块里一样分轴线上下：固定住所在下面（颜色淡一点），移动住所在上面；
     行中间加一条弱化的轴线，呼应住所板块里的时间轴线，但不抢视觉重点 */
  var resRowAxis = catY["residence"]!==undefined
    ? '<div class="tla-hgrid tla-res-axis" style="top:'+catY["residence"]+'px; width:'+chartW+'px"></div>' : '';
  var RES_OFFSET = 9;

  /* 细长的条状色块：有结束时间的按真实时长算宽度，没有的就是一段最短宽度的细条；工作/学校重叠时靠上面分出来的第二行区分，其它类别靠颜色区分 */
  var dots = metas.map(function(m){
    var t = m.t;
    var ck = t.category||"other";
    if(catY[ck]===undefined) return "";
    var isResidence = ck==="residence";
    var isMobileRes = isResidence && t.residenceType==="mobile";
    var isDual = !!DUAL_LANE_CATS[ck];
    var y;
    if(isDual){ y = catTop[ck] + m.lane*ROW_H + ROW_H/2; }
    else if(isResidence){ y = catY[ck] + (isMobileRes ? -RES_OFFSET : RES_OFFSET); }
    else { y = catY[ck]; }
    /* 颜色/填充方式跟各自板块保持一致：工作按状态类型（兼职/正职/实习）上色，住所按每条经历单独上色，
       其余类别用类别本色；只有工作和住所是实心填充条，跟专属板块里的展现形式对齐 */
    var color = isResidence ? colorForResidenceEntry(t) : timelineEntryColor(t);
    var fillClass = (ck==="work"||ck==="residence") ? " tl-period-fill" : "";
    var softClass = (isResidence && !isMobileRes) ? " tl-period-soft" : "";
    return '<div class="tl-period'+fillClass+' tla-bar'+softClass+'" data-id="'+t.id+'" style="left:'+m.x1+'px; width:'+m.width+'px; top:'+(y-BAR_H/2)+'px; height:'+BAR_H+'px; --period-color:'+color+'" onclick="openTimelineEntry(\''+t.id+'\')">'+
      '<div class="tl-period-bracket"></div>'+
      '<div class="tl-period-label">'+keywordWithTip(t.keyword||"时间段", t)+'</div>'+
    '</div>';
  }).join('');

  return '<div class="tl-axis-wrap">'+
    '<div class="tla-yaxis-col" style="height:'+(chartH+PAD_B)+'px">'+yAxisLabels+'</div>'+
    '<div class="tla-scroll" id="tlMatrixScroll">'+
      '<div class="tla-canvas" style="width:'+chartW+'px; height:'+(chartH+PAD_B)+'px">'+
        hGrid+vGrid+resRowAxis+
        '<div class="tla-vline" style="height:'+chartH+'px"></div>'+
        '<div class="tla-hline" style="top:'+chartH+'px; width:'+chartW+'px"></div>'+
        '<div class="tla-arrow-up" style="top:'+chartH+'px"></div>'+
        '<div class="tla-arrow-right" style="top:'+chartH+'px; left:'+chartW+'px"></div>'+
        dots+
        '<div class="tla-xrow" style="top:'+chartH+'px;">'+xAxisLabels+'</div>'+
      '</div>'+
    '</div>'+
  '</div>'+
  (birthYear===null ? '<div class="hz-detail-hint" style="margin-top:10px">在"基本信息"里填一个带"生日"字样的字段，横轴就能自动带出年纪啦</div>' : '');
}
/* ================= 通用标签页系统：任意板块的条目都可以点开变成顶部可关闭的标签页 ================= */
function findTab(key){ return openTabs.filter(function(t){return t.key===key;})[0]; }
/* 删除某条数据时，如果它当前正开着标签页，顺带关掉标签页（返回true表示已经处理了跳转/渲染，调用方不用再render） */
function closeTabAndMaybeGoHome(type, id){
  var key = type+":"+id;
  var had = openTabs.some(function(t){return t.key===key;});
  openTabs = openTabs.filter(function(t){return t.key!==key;});
  var wasActive = (VIEW==="itemDetail" && activeTabKey===key);
  if(wasActive){
    if(openTabs.length){ switchToItemTab(openTabs[openTabs.length-1].key); }
    else { go("home"); }
    return true;
  }
  if(had) render();
  return had;
}
function tabTitle(tab){
  if(!tab) return "详情";
  if(tab.type==="module") return labelFor(tab.id);
  if(tab.type==="worldmap") return labelFor("worldmap");
  if(tab.type==="timeline"){ var t=DATA.lifeTimeline.filter(function(x){return x.id===tab.id;})[0]; return t?(t.keyword||t.date||"经历"):"经历"; }
  if(tab.type==="password"){ var p=DATA.passwords.filter(function(x){return x.id===tab.id;})[0]; return p?p.site:"密码"; }
  if(tab.type==="asset"){ var a=DATA.assets.filter(function(x){return x.id===tab.id;})[0]; return a?a.title:"资产"; }
  if(tab.type==="contact"){ var c=DATA.contacts.filter(function(x){return x.id===tab.id;})[0]; return c?c.name:"联系人"; }
  if(tab.type==="customitem"){
    var b=(DATA.customBoards||[]).filter(function(x){return x.id===(tab.extra&&tab.extra.boardId);})[0];
    var it=b?b.items.filter(function(x){return x.id===tab.id;})[0]:null;
    return it?it.title:"内容";
  }
  return "详情";
}
function tabIcon(tab){
  if(tab && tab.type==="module"){
    var dest = destinationById(tab.id);
    return dest ? dest.icon : "📄";
  }
  var map = {worldmap:"🗺️", timeline:"🕰️", password:"🔐", asset:"💳", contact:"👥", customitem:"📌"};
  return (tab && map[tab.type]) || "📄";
}
window.openItemTab = function(type, id, extra){
  var key = type+":"+id;
  if(!findTab(key)){ openTabs.push({key:key, type:type, id:id, extra:extra||{}}); }
  switchToItemTab(key);
};
window.switchToItemTab = function(key){
  var tab = findTab(key);
  if(!tab) return;
  activeTabKey = key;
  VIEW = "itemDetail";
  document.getElementById("crumb").textContent = "首页 / "+tabTitle(tab);
  document.getElementById("crumb").onclick = function(){ go("home"); };
  document.getElementById("crumb").style.cursor = "pointer";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
};
window.closeItemTab = function(e, key){
  if(e && e.stopPropagation) e.stopPropagation();
  var tab = findTab(key);
  openTabs = openTabs.filter(function(t){return t.key!==key;});
  var wasActive = tab && (tab.type==="module" ? (VIEW===tab.id) : (VIEW==="itemDetail" && activeTabKey===key));
  if(wasActive){
    if(openTabs.length){
      var last = openTabs[openTabs.length-1];
      if(last.type==="module"){ go(last.id); } else { switchToItemTab(last.key); }
    } else { go("home"); }
  } else {
    render();
  }
};

/* ---- 添加/编辑经历：时间与关键词必填，其余字段完全自定义 ---- */
/* 旅游类别下，"关键词"本身既显示在时间轴上，也直接用来在世界版图上定位地点 */
var timelineDraft = null;
function isTimeRangeLabel(label){
  return !!label && (label.indexOf("时间段")!==-1 || label.indexOf("时间范围")!==-1 || label.indexOf("区间")!==-1 || label.toLowerCase().indexOf("period")!==-1 || label.toLowerCase().indexOf("range")!==-1);
}
function extractSpecialField(fieldsArr, matcher){
  var idx = -1;
  for(var i=0;i<fieldsArr.length;i++){ if(matcher(fieldsArr[i].label)){ idx=i; break; } }
  if(idx===-1) return {value:"", rest:fieldsArr};
  var value = fieldsArr[idx].value||"";
  var rest = fieldsArr.slice(0,idx).concat(fieldsArr.slice(idx+1));
  return {value:value, rest:rest};
}
window.editTimelineEntry = function(id){
  var item = id ? DATA.lifeTimeline.filter(function(x){return x.id===id;})[0] : null;
  if(item){
    var fieldsCopy = (item.fields||[]).map(function(f){ return {id:f.id||uid(), label:f.label||"", value:f.value||""}; });
    var trExtract = extractSpecialField(fieldsCopy, isTimeRangeLabel);
    timelineDraft = {
      id: item.id, date: item.date||"", dateEnd: item.dateEnd||"", keyword: item.keyword||"", category: item.category||"other",
      jobType: item.jobType||"", residenceType: item.residenceType||"",
      timeRange: trExtract.value,
      fields: trExtract.rest
    };
  } else {
    timelineDraft = {id:null, date:"", dateEnd:"", keyword:"", category:(timelineFilter!=="all"?timelineFilter:"other"), jobType:"", residenceType:"", timeRange:"", fields:[]};
  }
  renderTimelineEditModal();
};

  }).join('');
  var travelFieldsHtml = "";

      }).join('')+

  var residenceTypeFieldHtml = "";

  root.innerHTML = '<div class="modal-mask" id="mmask"><div class="modal">'+
    '<h3>'+(d.id?"编辑经历":"添加经历")+'</h3>'+

    '<div class="field"><label>结束时间（可选，填了这条经历会在时间轴上显示成一个跨年份的括弧，比如在读哪所学校）</label><input type="text" placeholder="如 2020-06，留空则是单个时间点" value="'+esc(d.dateEnd)+'" onchange="updateDraftBasic(\'dateEnd\',this.value)"></div>'+
    '<div class="field"><label>关键词（必填，会直接显示在时间轴上'+(d.category==="travel"?"；旅游类别下也会用它去世界版图上定位":"")+'）</label><input type="text" value="'+esc(d.keyword)+'" onchange="updateDraftBasic(\'keyword\',this.value)"></div>'+
    travelFieldsHtml+

      '<button type="button" class="btn ghost" onclick="closeModal()">取消</button><button type="button" class="btn solid" onclick="saveTimelineDraft()">保存</button></div>'+
    '</div></div>';
  document.getElementById("mmask").addEventListener("click", function(e){ if(e.target.id==="mmask") closeModal(); });
}

window.deleteWorkTag = function(key){
  if((DATA.workTags||[]).length<=1) return;
  confirmDelete("确定删除这个标签吗？用过这个标签的经历会变回默认颜色。", function(){
    DATA.workTags = (DATA.workTags||[]).filter(function(x){return x.key!==key;});
    DATA.lifeTimeline.forEach(function(t){ if(t.jobType===key){ t.jobType = ""; } });

window.addWorkTag = function(){
  var input = document.getElementById("newWorkTagName");
  var value = (input.value||"").trim();

window.saveTimelineDraft = async function(){
  var d = timelineDraft;
  if(!d.date || !d.date.trim()){ toast("时间是必填的"); return; }
  if(!d.keyword || !d.keyword.trim()){ toast("关键词是必填的"); return; }
  var cleanFields = d.fields.filter(function(f){ return (f.label&&f.label.trim()) || (f.value&&f.value.trim()); });
  if(d.category==="travel" && d.timeRange && d.timeRange.trim()){
    cleanFields = cleanFields.concat([{id:uid(), label:"时间段", value:d.timeRange.trim()}]);
  }
  var locText = d.keyword.trim();

  var geo = undefined; // undefined = don't touch existing geo; null = clear geo; object = set geo
  if(d.category==="travel" && locText){
    closeModal();
    toast("正在定位「"+locText+"」…");
    var results = await geocodeLocation(locText);
    if(results===null){
      toast("定位失败："+lastGeocodeError+"（如果是用双击直接打开的 html 文件，浏览器可能会拦截这个请求，试试用本地服务器打开）", 6000);
      geo = undefined;
    } else if(results.length===0){
      toast("没找到「"+locText+"」，这条经历暂时不会出现在地图上");
      geo = null;
    } else if(results.length===1){
      geo = results[0];
    } else {
      geo = await pickGeoFromList(results, locText);
      if(geo===null){ toast("已跳过定位"); }
    }
  } else {
    geo = null;
  }

  var normDate = normalizeDateInput(d.date.trim());
  var normDateEnd = (d.dateEnd&&d.dateEnd.trim()) ? normalizeDateInput(d.dateEnd.trim()) : "";
  var jobType = d.category==="work" ? (d.jobType||"") : "";
  var residenceType = d.category==="residence" ? (d.residenceType||"") : "";
  if(d.id){
    var item = DATA.lifeTimeline.filter(function(x){return x.id===d.id;})[0];
    if(item){
      item.date = normDate; item.dateEnd = normDateEnd; item.keyword = d.keyword.trim(); item.category = d.category||"other"; item.jobType = jobType; item.residenceType = residenceType; item.fields = cleanFields;
      if(geo===null){ delete item.geo; } else if(geo){ item.geo = geo; }
    }
  } else {
    var newItem = {id:uid(), date:normDate, dateEnd:normDateEnd, keyword:d.keyword.trim(), category:d.category||"other", jobType:jobType, residenceType:residenceType, fields:cleanFields};
    if(geo && geo!==null){ newItem.geo = geo; }
    DATA.lifeTimeline.push(newItem);
  }
  var wasAdd = !d.id;
  timelineDraft = null;
  save(); closeModal(); render(); toast(wasAdd?"已添加":"已更新");
};

/* ---- 世界版图：基于真实地理编码的全球地点搜索（OpenStreetMap Nominatim，免费无需 key） ---- */
/* 地图本身用 Leaflet + OpenStreetMap 真实地图瓦片渲染，不再是手绘示意图 */
var lastGeocodeError = "";
async function geocodeLocation(query){
  try{
    var url = "https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=8&accept-language=zh-CN&q=" + encodeURIComponent(query);
    var res = await fetch(url);
    if(!res.ok){ lastGeocodeError = "HTTP "+res.status; return null; }
    var data = await res.json();
    return data.map(function(r){ return {lat: parseFloat(r.lat), lon: parseFloat(r.lon), name: r.display_name}; });
  }catch(e){
    lastGeocodeError = (e && e.message) ? e.message : String(e);
    return null;
  }
}
function pickGeoFromList(results, query){
  return new Promise(function(resolve){
    var root = document.getElementById("modalRoot");
    window.__geoPickResults = results;
    window.__resolveGeoPick = function(i){
      var chosen = i>=0 ? window.__geoPickResults[i] : null;
      root.innerHTML = "";
      resolve(chosen);
    };
    var rows = results.map(function(r,i){
      return '<button type="button" class="geo-pick-row" onclick="window.__resolveGeoPick('+i+')">'+esc(r.name)+'</button>';
    }).join('');
    root.innerHTML = '<div class="modal-mask" id="gmask"><div class="modal">'+
      '<h3>找到多个叫「'+esc(query)+'」的地方</h3>'+
      '<div class="sub" style="margin-bottom:10px">选择具体是哪一个：</div>'+
      '<div class="geo-pick-list">'+rows+'</div>'+
      '<div class="modal-actions"><button type="button" class="btn ghost" onclick="window.__resolveGeoPick(-1)">跳过，不标记地图</button></div>'+
      '</div></div>';
    document.getElementById("gmask").addEventListener("click", function(e){
      if(e.target.id==="gmask"){ root.innerHTML=""; resolve(null); }
    });
  });
}
function entryTimeRange(t){
  var f = (t.fields||[]).filter(function(x){
    return x.label && (x.label.indexOf("时间段")!==-1 || x.label.indexOf("时间范围")!==-1 || x.label.indexOf("区间")!==-1 || x.label.toLowerCase().indexOf("period")!==-1 || x.label.toLowerCase().indexOf("range")!==-1);
  })[0];
  return f && f.value ? f.value : (t.date||"");
}
function buildMapData(){
  var travelEntries = DATA.lifeTimeline.filter(function(t){ return (t.category||"other")==="travel"; });
  var groups = {}, unresolved = [];
  travelEntries.forEach(function(t){
    if(t.geo && typeof t.geo.lat==="number" && typeof t.geo.lon==="number"){
      var gk = t.geo.lat.toFixed(2)+","+t.geo.lon.toFixed(2);
      groups[gk] = groups[gk] || {coords:[t.geo.lat,t.geo.lon], name:t.geo.name, list:[]};
      groups[gk].list.push(t);
    } else if(t.keyword){
      unresolved.push(t.keyword);
    }
  });
  return {groups:groups, unresolved:unresolved};
}
function renderWorldMapPage(){
  var d = buildMapData();
  var legend = Object.keys(d.groups).map(function(gk){
    var g = d.groups[gk];
    var shortName = g.name.split("，")[0].split(",")[0];
    return '<span class="map-chip" onclick="focusMapGroup(\''+gk+'\')">'+esc(shortName)+' · '+g.list.length+'</span>';
  }).join('') + d.unresolved.map(function(u){
    return '<span class="map-chip unmapped">'+esc(u)+' · 未定位</span>';
  }).join('');
  var body = '<div class="map-wrap"><div id="leafletMap" class="leaflet-map-el"></div>'+
    (legend ? ('<div class="map-legend">'+legend+'</div>') : '<div class="map-note">还没有可点亮的地点，去「时间经历」里加一条旅游类别的经历，关键词填地名试试（需要联网才能定位）。</div>')+
    '<div class="map-note">地图由 OpenStreetMap 提供，地点坐标来自 OpenStreetMap 的免费公共搜索，保存经历时自动定位；「未定位」的可能是网络问题或没搜到，重新编辑保存一次即可再试。以上均需要联网。</div>'+
  '</div>';
  return moduleShell("worldmap","🗺️","worldmap","只读取「时间经历」里「旅游」类别下的经历——保存时会自动用 OpenStreetMap 全球搜索地点（需要联网），遇到同名地点会让你手动选择；点击地图上的标记可以进入这条经历的详情页。","",
    body);
}
var __leafletMapInstance = null;
var __leafletMarkerLayers = {};
function setupLeafletMap(){
  var el = document.getElementById("leafletMap");
  if(!el) return;
  if(__leafletMapInstance){
    try{ __leafletMapInstance.remove(); }catch(e){}
    __leafletMapInstance = null;
  }
  if(typeof L === "undefined"){
    el.outerHTML = '<div class="map-fallback">地图库没能加载出来（可能是网络问题，或者当前环境限制了外部资源加载）。地点数据还在，换个环境或者刷新一下这一页可能就好了。</div>';
    return;
  }
  var pinIcon = L.divIcon({
    className: "geo-pin-icon",
    html: '<svg width="26" height="36" viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">'+
      '<path d="M11 0C5 0 0 5 0 11c0 8 11 21 11 21s11-13 11-21C22 5 17 0 11 0z" fill="#B3483C" stroke="#fff" stroke-width="1"/>'+
      '<circle cx="11" cy="11" r="4.5" fill="#fff"/>'+
    '</svg>',
    iconSize: [26,36],
    iconAnchor: [13,36],
    popupAnchor: [0,-32]
  });
  /* 初始固定为世界全览（最小缩放），只有手动缩放/双指才会放大，不自动对着标记点放大 */
  var map = L.map("leafletMap", {scrollWheelZoom:true, minZoom:2}).setView([20,10], 2);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors'
  }).addTo(map);
  __leafletMapInstance = map;
  __leafletMarkerLayers = {};

  var d = buildMapData();
  Object.keys(d.groups).forEach(function(gk){
    var g = d.groups[gk];
    var shortName = g.name.split("，")[0].split(",")[0];
    var marker = L.marker([g.coords[0], g.coords[1]], {icon:pinIcon}).addTo(map);
    var popupHtml = '<div style="font-family:IBM Plex Sans,sans-serif;font-size:13px;min-width:140px">'+
      '<div style="font-weight:600;margin-bottom:4px">'+esc(shortName)+'</div>'+
      g.list.map(function(t){

          '<button class="map-popup-btn" onclick="openTimelineEntry(\''+t.id+'\')">'+esc(t.keyword||"查看详情")+' →</button>'+
        '</div>';
      }).join('')+
    '</div>';
    marker.bindPopup(popupHtml);
    __leafletMarkerLayers[gk] = marker;
  });
}
window.focusMapGroup = function(gk){
  var marker = __leafletMarkerLayers[gk];
  if(!marker || !__leafletMapInstance) return;
  __leafletMapInstance.setView(marker.getLatLng(), 10);
  marker.openPopup();
};

function daysInfo(dateStr, repeatYearly){
  if(!dateStr) return "";
  var today = new Date(); today.setHours(0,0,0,0);
  var d = new Date(dateStr); if(isNaN(d.getTime())) return "";
  if(repeatYearly){
    var next = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    if(next < today) next.setFullYear(next.getFullYear()+1);
    var diff = Math.round((next-today)/86400000);
    return diff===0 ? "就是今天 🎉" : ("还有 "+diff+" 天");
  } else {
    var diff2 = Math.round((today-d)/86400000);
    return diff2>=0 ? ("已经过去 "+diff2+" 天") : ("还有 "+Math.abs(diff2)+" 天");
  }
}

window.updateAssetDraftBasic = function(key, value){ if(assetDraft) assetDraft[key] = value; };
window.addAssetDraftField = function(){
  assetDraft.fields.push({id:uid(), label:"", value:""});
  renderAssetEditModal();
};
window.removeAssetDraftField = function(fid){
  assetDraft.fields = assetDraft.fields.filter(function(f){return f.id!==fid;});
  renderAssetEditModal();
};
window.updateAssetDraftField = function(fid, key, value){
  var f = assetDraft.fields.filter(function(x){return x.id===fid;})[0];
  if(f) f[key] = value;
};
window.saveAssetDraft = function(){
  var d = assetDraft;
  if(!d.title || !d.title.trim()){ toast("名称是必填的"); return; }
  var cleanFields = d.fields.filter(function(f){ return (f.label&&f.label.trim()) || (f.value&&f.value.trim()); });
  if(d.id){
    var item = DATA.assets.filter(function(x){return x.id===d.id;})[0];
    if(item){ item.title=d.title.trim(); item.location=d.location||""; item.assetType=d.assetType||""; item.fields=cleanFields; }
  } else {
    DATA.assets.push({id:uid(), title:d.title.trim(), location:d.location||"", assetType:d.assetType||"", fields:cleanFields});
  }
  var wasAdd = !d.id;
  assetDraft = null;
  save(); closeModal(); render(); toast(wasAdd?"已新增":"已更新");
};

function renderPhotoModule(viewId, dataKey, icon, key, sub, captionField, albumField){
  var list = DATA[dataKey];
  var groups = {};
  if(albumField){
    list.forEach(function(x){ var g=x[albumField]||"未分组"; (groups[g]=groups[g]||[]).push(x); });
  } else { groups["__all"] = list; }

  var html = "";
  Object.keys(groups).forEach(function(g){
    if(albumField) html += '<div class="section-label" style="margin-top:26px">'+esc(g)+'</div>';
    html += '<div class="photo-grid">';
    groups[g].forEach(function(ph){
      html += '<div class="photo-card">'+
        (ph.dataUrl ? '<img class="thumb" src="'+ph.dataUrl+'">' : '<div class="thumb placeholder">🖼️</div>')+
        '<div class="cap"><span class="lbl">'+esc(ph[captionField]||"未命名")+'</span>'+
        '<span class="row-actions"><button class="btn small ghost" onclick="editPhoto(\''+dataKey+'\',\''+ph.id+'\',\''+captionField+'\',\''+(albumField||"")+'\')">✎</button><button class="btn small danger" onclick="deletePhoto(\''+dataKey+'\',\''+ph.id+'\')">✕</button></span>'+
        '</div></div>';
    });
    html += '<label class="upload-tile">📤 上传照片<input type="file" accept="image/*" onchange="uploadPhoto(this,\''+dataKey+'\',\''+captionField+'\',\''+(albumField||"")+'\')"></label>';
    html += '</div>';
  });
  if(!list.length){
    html = emptyState("📷","还没有照片","点击下方上传第一张")+'<div class="photo-grid" style="margin-top:14px"><label class="upload-tile">📤 上传照片<input type="file" accept="image/*" onchange="uploadPhoto(this,\''+dataKey+'\',\''+captionField+'\',\''+(albumField||"")+'\')"></label></div>';
  }
  return moduleShell(viewId, icon, key, sub, "", html);
}
window.uploadPhoto = function(input, dataKey, captionField, albumField){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var item = {id:uid(), dataUrl:e.target.result};
    item[captionField] = "新照片";
    if(albumField) item[albumField] = "未分组";
    DATA[dataKey].push(item);
    try{ save(); }catch(err){ toast("保存失败：浏览器本地存储空间不足"); DATA[dataKey].pop(); return; }
    render(); toast("已上传");
  };
  reader.readAsDataURL(file);
};
window.editPhoto = function(dataKey, id, captionField, albumField){
  var item = DATA[dataKey].filter(function(x){return x.id===id;})[0];
  openModal("编辑信息",
    field(captionField, captionField==="label"?"名称":"说明", "text", item[captionField], true)+
    (albumField ? field(albumField,"所属相册","text",item[albumField],false) : ""),
    function(data){ Object.assign(item,data); save(); render(); toast("已更新"); });
};
window.deletePhoto = function(dataKey, id){
  confirmDelete("确定删除这张照片吗？", function(){
    DATA[dataKey] = DATA[dataKey].filter(function(x){return x.id!==id;});
    save(); render(); toast("已删除");
  });
};

  }
  return '<div class="module-head"><div><h2>📌 '+esc(it.title)+'</h2><div class="sub">'+esc(labelFor(boardId))+'</div></div>'+
    '<div class="row-actions"><button class="btn ghost" onclick="editCustomBoardItem(\''+boardId+'\',\''+it.id+'\')">编辑</button><button class="btn danger" onclick="deleteCustomBoardItem(\''+boardId+'\',\''+it.id+'\')">删除</button></div></div>'+
    '<div class="hz-detail"><table class="hz-detail-table">'+
      '<tr><th>内容</th><td>'+esc(it.note||"—")+'</td></tr>'+
    '</table></div>';
}

function renderContacts(){
  var cats = getModuleCategories("contacts");
  if(cats.length && !moduleCatView.contacts && moduleCatView.contacts!==""){
    return moduleShell("contacts","👥","contacts","重要联系人和关系备注。",
      '<button class="btn solid" onclick="editContact()">+ 新增联系人</button>',
      renderCategoryFolders("contacts", DATA.contacts, function(it){return it.category||"";})
    );
  }
  var scoped = cats.length ? DATA.contacts.filter(function(c){ return (c.category||"")===moduleCatView.contacts; }) : DATA.contacts;
  var cards = scoped.map(function(c){
    return '<div class="contact-card"><div class="row-actions"><button class="btn small ghost" onclick="editContact(\''+c.id+'\')">✎</button><button class="btn small danger" onclick="deleteContact(\''+c.id+'\')">✕</button></div>'+
      '<div class="initial">'+esc((c.name||"?").slice(0,1))+'</div>'+
      '<h4 class="row-open-link" onclick="openItemTab(\'contact\',\''+c.id+'\')">'+esc(c.name)+'</h4>'+
      '<div class="rel">'+esc(c.relation||"未分类")+'</div>'+
      '<div class="phone">'+esc(c.phone||"—")+'</div>'+
      (c.note?('<div class="note">'+esc(c.note)+'</div>'):'')+
    '</div>';
  }).join('');
  var backBar = cats.length ? categoryBackBar("contacts") : "";
  return moduleShell("contacts","👥","contacts","重要联系人和关系备注。",
    '<button class="btn solid" onclick="editContact()">+ 新增联系人</button>',
    backBar + (scoped.length ? ('<div class="contact-grid">'+cards+'</div>') : emptyState("👥","这里还没有联系人","点击右上角「新增联系人」"))
  );
}
window.editContact = function(id){
  var item = id ? DATA.contacts.filter(function(x){return x.id===id;})[0] : {name:"",relation:"",phone:"",note:"",category:moduleCatView.contacts||""};
  openModal(id?"编辑联系人":"新增联系人",
    field("name","姓名","text",item.name,true)+
    field("relation","关系（如：同事/家人/朋友）","text",item.relation,false)+
    moduleCategorySelectField("contacts", item.category)+
    field("phone","电话","text",item.phone,false)+
    field("note","备注","textarea",item.note,false),
    function(data){
      if(id){ Object.assign(item,data); }
      else{ data.id=uid(); DATA.contacts.push(data); }
      save(); render(); toast(id?"已更新":"已新增");
    });
};
window.deleteContact = function(id){
  confirmDelete("确定删除这位联系人吗？", function(){
    DATA.contacts = DATA.contacts.filter(function(x){return x.id!==id;});
    save();
    if(!closeTabAndMaybeGoHome("contact", id)) render();
    toast("已删除");
  });
};
function renderContactDetailPage(id){
  var c = DATA.contacts.filter(function(x){return x.id===id;})[0];
  if(!c){
    return '<div class="module-head"><div><h2>没找到这条记录</h2><div class="sub">它可能已经被删除了。</div></div></div>'+
      '<button class="btn ghost" onclick="go(\'home\')">‹ 返回首页</button>';
  }
  return '<div class="module-head"><div><h2>👥 '+esc(c.name)+'</h2><div class="sub">'+esc(c.relation||"未分类")+'</div></div>'+
    '<div class="row-actions"><button class="btn ghost" onclick="editContact(\''+c.id+'\')">编辑</button><button class="btn danger" onclick="deleteContact(\''+c.id+'\')">删除</button></div></div>'+
    '<div class="hz-detail"><table class="hz-detail-table">'+
      '<tr><th>关系</th><td>'+esc(c.relation||"—")+'</td></tr>'+
      '<tr><th>电话</th><td>'+esc(c.phone||"—")+'</td></tr>'+
      '<tr><th>备注</th><td>'+esc(c.note||"—")+'</td></tr>'+
    '</table></div>';
}

/* ================= 公共小组件 ================= */
function moduleShell(id, icon, key, sub, actionHtml, bodyHtml){
  var label = labelFor(key);
  return '<div class="module-head"><div>'+
    '<div class="title-row"><h2>'+icon+' '+esc(label)+'</h2>'+
    '<button class="title-edit-btn" onclick="editSectionLabel(\''+key+'\')" title="重命名">✎</button></div>'+
    '<div class="sub">'+sub+'</div></div>'+actionHtml+'</div>'+bodyHtml;
}
function emptyState(icon,title,sub){
  return '<div class="card-panel"><div class="empty-state"><div class="big">'+icon+'</div><div style="font-size:15px;margin-bottom:4px">'+title+'</div><div style="font-size:12.5px">'+sub+'</div></div></div>';
}
function field(name,label,type,value,required){
  if(type==="textarea"){
    return '<div class="field"><label>'+esc(label)+'</label><textarea name="'+name+'">'+esc(value||"")+'</textarea></div>';
  }
  return '<div class="field"><label>'+esc(label)+'</label><input name="'+name+'" type="text" value="'+esc(value||"")+'" '+(required?"required":"")+'></div>';
}
function fieldDate(name,label,value,required){
  return '<div class="field"><label>'+esc(label)+'</label><input name="'+name+'" type="date" value="'+esc(value||"")+'" '+(required?"required":"")+'></div>';
}
function fieldSelect(name,label,options,value){
  return '<div class="field"><label>'+esc(label)+'</label><select name="'+name+'">'+options.map(function(o){
    return '<option value="'+esc(o.value)+'"'+(o.value===value?' selected':'')+'>'+esc(o.label)+'</option>';
  }).join('')+'</select></div>';
}

async function boot(){
  var loaded = await loadDataAsync();
  if(loaded){
    DATA = loaded;
  } else {
    save();
  }
  render();
  applyBackgroundImage();
}
boot();
</script>
</body>
</html>

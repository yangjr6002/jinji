<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Space</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%90%91</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --surface-2:#FAFAF8;
  --border:#E7E5E0;
  --border-soft:#F0EEE9;
  --text:#1C1C1A;
  --text-dim:#8C897E;
  --text-faint:#B7B4AA;
  --accent:#2F5D50;
  --accent-soft:#EAF1EE;
  --danger:#B3483C;
  --danger-soft:#FBEEEC;
  --shadow: 0 1px 2px rgba(20,20,15,.04), 0 8px 24px rgba(20,20,15,.05);
  --shadow-lg: 0 4px 10px rgba(20,20,15,.06), 0 18px 40px rgba(20,20,15,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft);color:var(--accent)}

/* ---- layout shell ---- */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px;
  background:rgba(255,255,255,.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(6px);
}
.brand{display:flex; align-items:center; gap:9px; font-family:'Fraunces',serif; font-size:17px; font-weight:600; letter-spacing:.01em;}
.brand .mark{
  width:24px;height:24px;border:1.5px solid var(--text);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text);
  font-family:'IBM Plex Mono',monospace;
}
.crumb{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;cursor:pointer}
.crumb:hover{color:var(--accent)}
.warn-banner{
  background:var(--surface-2); color:var(--text-dim); border-bottom:1px solid var(--border);
  font-size:11.5px; padding:7px 28px; display:flex; gap:8px; align-items:center;
}
.warn-banner b{color:var(--text)}
.toptabs{
  position:sticky; top:53px; z-index:49;
  display:flex; gap:6px; padding:9px 28px;
  background:rgba(255,255,255,.9); border-bottom:1px solid var(--border); backdrop-filter:blur(6px);
  overflow-x:auto; flex-wrap:nowrap;
}
.toptab{
  flex:none;
  font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600;
  padding:6px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--text-dim); transition:.15s; white-space:nowrap;
}
.toptab:hover{border-color:var(--text-faint); color:var(--text);}
.toptab.active{background:var(--text); color:#fff; border-color:var(--text);}
.toptab-dyn{
  flex:none; display:inline-flex; align-items:center; gap:6px;
  font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600;
  padding:6px 8px 6px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--text-dim); transition:.15s; white-space:nowrap; cursor:pointer;
}
.toptab-dyn:hover{border-color:var(--text-faint); color:var(--text);}
.toptab-dyn.active{background:var(--text); color:#fff; border-color:var(--text);}
.toptab-dyn .tclose{
  width:15px; height:15px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:9px; background:var(--surface-2); color:var(--text-dim); flex:none;
}
.toptab-dyn.active .tclose{background:rgba(255,255,255,.25); color:#fff;}
.toptab-dyn .tclose:hover{background:var(--danger); color:#fff;}

.wrap{max-width:1080px; margin:0 auto; padding:44px 28px 80px;}

/* ---- home / dossier ---- */
.dossier-head{margin-bottom:48px;}
.id-block{padding-top:4px;}
.name-row{display:flex; align-items:center; gap:10px;}
.id-block h1{font-size:40px; margin:0; font-weight:600; letter-spacing:.005em; line-height:1.1; cursor:pointer; transition:opacity .12s;}
.id-block h1:hover{opacity:.7;}
.name-edit-btn{
  border:1px solid var(--border); background:var(--surface); color:var(--text-dim);
  width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:13px; flex:none; transition:.15s;
}
.name-edit-btn:hover{border-color:var(--accent); color:var(--accent);}
.id-block .sub-hint{display:none;}
.quick-access-inline{margin-top:18px;}

.avatar-preview-box{width:100%; aspect-ratio:3/4; border-radius:12px; overflow:hidden; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center;}
.avatar-preview-box img{width:100%; height:100%; object-fit:cover; display:block;}
.avatar-preview-placeholder{font-family:'Fraunces',serif; font-size:64px; color:var(--text-faint);}
.avatar-upload-btn{display:block; text-align:center; margin-top:14px; cursor:pointer;}
.avatar-upload-btn input{display:none;}

/* ---- home sections ---- */
.home-section{margin-bottom:52px; position:relative; padding-left:22px; transition:opacity .12s;}
.home-section:last-child{margin-bottom:0;}
.home-section.dragging{opacity:.4;}
.drag-handle{
  position:absolute; left:-2px; top:2px; width:20px; height:20px; border-radius:5px;
  display:flex; align-items:center; justify-content:center; cursor:grab;
  color:var(--text-faint); font-size:13px; letter-spacing:-2px; user-select:none; transition:.15s;
}
.drag-handle:hover{color:var(--text-dim); background:var(--surface-2);}
.drag-handle:active{cursor:grabbing;}
.drag-handle-sm{
  display:inline-flex; align-items:center; justify-content:center; width:16px; height:20px;
  cursor:grab; color:var(--text-faint); font-size:11px; letter-spacing:-2px; user-select:none;
  opacity:0; transition:.15s;
}
tr:hover .drag-handle-sm, .row-open-link:hover ~ .drag-handle-sm{opacity:1;}
.bi-row:hover .drag-handle-sm, .cat-manage-row:hover .drag-handle-sm{opacity:1;}
.drag-handle-sm:hover{color:var(--text-dim);}
.drag-handle-sm:active{cursor:grabbing;}
.quick-link[draggable="true"], .folder[draggable="true"]{cursor:grab;}
.section-header-row{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;}
.cat-back-bar{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
.cat-folder-list{display:flex; flex-direction:column;}
.cat-folder-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border-soft); cursor:pointer; transition:background .12s;}
.cat-folder-row:last-child{border-bottom:none;}
.cat-folder-row:hover{background:var(--surface-2);}
.cat-folder-row:hover .cflabel{color:var(--accent);}
.cat-folder-row .cflabel{font-size:13.5px; font-weight:600; color:var(--text);}
.cat-folder-row .cfcount{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--text-dim); flex:none;}
.cat-back-label{font-size:13px; font-weight:600; color:var(--text); flex:1;}
.section-label{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text-dim); margin:0; padding-bottom:8px; border-bottom:1px solid var(--border); flex:1;
}
.gear-btn{
  width:26px;height:26px;border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text-dim);
  display:flex;align-items:center;justify-content:center; font-size:12px; flex:none; transition:.15s;
}
.gear-btn:hover{border-color:var(--text-faint); color:var(--text);}
.bg-settings-btn{
  width:26px; height:26px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  color:var(--text-dim); display:flex; align-items:center; justify-content:center; font-size:12px; transition:.15s; flex:none;
}
.bg-settings-btn:hover{border-color:var(--accent); color:var(--accent);}
.bg-image-layer{
  position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center; background-repeat:no-repeat;
  pointer-events:none; opacity:0;
}
.bg-preview-box{width:100%; aspect-ratio:16/9; border-radius:10px; overflow:hidden; background:var(--surface-2); border:1px solid var(--border); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:12px;}
.bg-opacity-row{display:flex; align-items:center; gap:10px; margin-top:14px;}
.bg-opacity-row input[type="range"]{flex:1;}
.bg-opacity-val{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim); width:34px; text-align:right; flex:none;}

/* ---- quick access: list / grid ---- */
.quick-access-box{position:relative; width:100%; padding-right:30px;}
.quick-links{display:flex; flex-wrap:nowrap; align-items:baseline; font-size:13px; overflow-x:auto; max-width:100%; padding-bottom:2px;}
.quick-link{flex:none; white-space:nowrap; color:var(--text); font-weight:600; cursor:pointer; transition:color .12s;}
.quick-link:hover{color:var(--accent);}
.quick-link.sensitive:hover{color:var(--danger);}
.quick-link .qn{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text-faint); margin-left:3px; font-weight:400;}
.quick-sep{flex:none; color:var(--text-faint); margin:0 9px; font-size:12px;}
.quick-links-empty{font-size:12.5px; color:var(--text-faint);}
.mod-icon{font-size:14px; flex:none; width:18px; text-align:center;}
.mod-visible-check{flex:none; width:15px; height:15px; cursor:pointer;}
.gear-float{position:absolute; top:-9px; right:0; background:var(--surface); box-shadow:var(--shadow);}

.tab-grid{display:flex; flex-wrap:wrap; gap:7px; max-width:100%;}
.folder{
  position:relative; background:var(--surface); color:var(--text);
  border-radius:9px; padding:9px 10px 8px; width:96px; flex:0 0 auto;
  box-shadow:var(--shadow); cursor:pointer; overflow:hidden;
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
  border:1px solid var(--border);
}
.folder:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg); border-color:var(--text-faint);}
.folder .ftop{display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;}
.folder .ficon{font-size:13px; line-height:1;}
.folder .count{font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--text-dim);}
.folder.sensitive .count{color:var(--danger);}
.folder h3{margin:0; font-size:11.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* ---- module pages (sub pages) ---- */
.module-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px; flex-wrap:wrap;}
.module-head h2{font-size:20px; margin:0;}
.title-row{display:flex; align-items:center; gap:7px; margin-bottom:6px;}
.title-edit-btn{
  border:1px solid var(--border); background:var(--surface); color:var(--text-dim);
  width:21px; height:21px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:10px; flex:none; transition:.15s; cursor:pointer;
}
.title-edit-btn:hover{border-color:var(--accent); color:var(--accent);}
.module-head .sub{display:none;}
.btn{
  font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:13px;
  padding:9px 15px; border-radius:7px; border:1px solid var(--text);
  background:transparent; color:var(--text); transition:.15s;
}
.btn:hover{background:var(--text); color:#fff;}
.btn.solid{background:var(--text); color:#fff;}
.btn.solid:hover{background:#000; border-color:#000;}
.btn.ghost{border-color:var(--border); color:var(--text-dim);}
.btn.ghost:hover{border-color:var(--text-dim); color:var(--text); background:transparent;}
.btn.danger{border-color:var(--danger); color:var(--danger);}
.btn.danger:hover{background:var(--danger); color:#fff;}
.btn.small{padding:5px 10px; font-size:11.5px; border-radius:6px;}
.tl-orient-btn{width:30px; height:30px; padding:0; font-size:15px; display:flex; align-items:center; justify-content:center; flex:none; border-radius:8px;}

/* password table */
.card-panel{background:var(--surface); color:var(--text); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; border:1px solid var(--border);}
.asset-table-wrap{
  max-height:66vh; overflow:auto; border:1px solid var(--border); border-radius:12px;
  box-shadow:var(--shadow); background:var(--surface); cursor:grab;
}
.asset-table-wrap.grabbing{cursor:grabbing;}
.asset-table{border-collapse:collapse; width:max-content; min-width:100%; font-size:13px;}
.asset-table th{
  position:sticky; top:0; z-index:2; text-align:left; white-space:nowrap;
  padding:11px 16px; background:var(--surface-2); color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.asset-table td{padding:11px 16px; white-space:nowrap; border-bottom:1px solid var(--border-soft); color:var(--text);}
.asset-table tr:last-child td{border-bottom:none;}
.asset-table tr:hover td{background:var(--surface-2);}
.asset-table td .row-actions{display:flex; gap:6px;}
table.data{width:100%; border-collapse:collapse; font-size:13.5px;}
table.data th{text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--text-dim); padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface-2);}
table.data td{padding:13px 16px; border-bottom:1px solid var(--border-soft); vertical-align:middle;}
table.data tr:last-child td{border-bottom:none}
table.data tr:hover{background:var(--surface-2)}
.pw-mask{font-family:'IBM Plex Mono',monospace; letter-spacing:.1em;}
.reveal-btn{background:none;border:none;color:var(--accent); font-size:12px; margin-left:8px; text-decoration:underline; padding:0;}
.row-actions{display:flex; gap:8px;}
.empty-state{padding:56px 20px; text-align:center; color:var(--text-dim);}
.empty-state .big{font-size:30px; margin-bottom:10px; opacity:.5}

/* asset / card grid */
.asset-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px;}
.bank-card{
  border-radius:12px; padding:18px 20px; color:var(--text); position:relative; overflow:hidden;
  min-height:120px; display:flex; flex-direction:column; justify-content:space-between;
  box-shadow:var(--shadow); background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent-bar, var(--accent));
}
.bank-card .type{font-size:10.5px; font-family:'IBM Plex Mono',monospace; letter-spacing:.06em; color:var(--text-dim)}
.bank-card .num{font-family:'IBM Plex Mono',monospace; font-size:16px; letter-spacing:.08em; margin:12px 0 5px;}
.bank-card .holder{font-size:12px; color:var(--text-dim)}
.bank-card .bankname{font-family:'Fraunces',serif; font-size:15px; font-weight:600;}
.bank-card .card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.card-actions{position:absolute; top:12px; right:12px; display:flex; gap:6px;}
.card-actions button{background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); width:24px;height:24px;border-radius:50%; font-size:11px;}
.card-actions button:hover{color:var(--text); border-color:var(--text-faint);}

/* photo grid */
.photo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px;}
.photo-card{background:var(--surface); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border);}
.photo-card .thumb{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:var(--surface-2);}
.photo-card .thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text-faint);}
.photo-card .cap{padding:9px 11px; font-size:12px; color:var(--text); display:flex; justify-content:space-between; align-items:center; gap:6px;}
.photo-card .cap .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.upload-tile{
  border:1.5px dashed var(--border); border-radius:10px; aspect-ratio:4/3;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  color:var(--text-dim); font-size:12px; cursor:pointer; background:var(--surface-2);
}
.upload-tile:hover{border-color:var(--text-faint); color:var(--text)}
.upload-tile input{display:none}

/* timeline (life experience) */
.tl-filter-row{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px;}
.tl-filter-row .gear-btn{margin-left:auto;}
/* 时间经历"全部"坐标图：横轴时间/年纪，纵轴类别，事件是画在交叉点上的圆点，真正的坐标轴而不是表格 */
.tl-axis-wrap{display:flex; align-items:flex-start; border:1px solid var(--border); border-radius:10px; background:var(--surface); overflow:hidden;}
.tla-yaxis-col{position:relative; flex:none; width:88px; border-right:1.5px solid var(--text-faint); background:var(--surface-2);}
.tla-ylabel{
  position:absolute; left:0; right:0; display:flex; align-items:center; gap:6px;
  padding:0 10px; font-size:11px; font-weight:700; color:var(--text); cursor:pointer;
  border-bottom:1px solid var(--border-soft); box-sizing:border-box; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tla-ylabel::before{content:""; flex:none; width:7px; height:7px; border-radius:50%; background:var(--cat-color);}
.tla-ylabel:hover{color:var(--cat-color); background:var(--surface);}
.tla-scroll{overflow-x:auto; flex:1; cursor:grab;}
.tla-scroll.grabbing{cursor:grabbing;}
.tla-canvas{position:relative;}
.tla-hgrid{position:absolute; left:0; height:1px; background:var(--border-soft);}
.tla-res-axis{opacity:.4;}
.tla-vgrid{position:absolute; top:0; width:1px; background:var(--border-soft);}
.tla-vline{position:absolute; left:0; top:0; width:1.5px; background:var(--text-faint);}
.tla-hline{position:absolute; left:0; height:1.5px; background:var(--text-faint);}
.tla-arrow-up{position:absolute; left:-3.5px; width:0; height:0; border-left:3.5px solid transparent; border-right:3.5px solid transparent; border-bottom:6px solid var(--text-faint); margin-top:-6px;}
.tla-arrow-right{position:absolute; margin-top:-3.5px; width:0; height:0; border-top:3.5px solid transparent; border-bottom:3.5px solid transparent; border-left:6px solid var(--text-faint);}
.tla-xrow{position:absolute; left:0;}
.tla-xlabel{position:absolute; top:0; text-align:center; padding-top:8px;}
.tla-year{font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; color:var(--text);}
.tla-age{font-size:9px; color:var(--text-dim); margin-top:2px; white-space:nowrap;}
.tla-bar{ z-index:1; transition:transform .12s; }
.tla-bar:hover{ transform:scaleY(1.6); z-index:5; }
.tla-dot-label{
  position:absolute; transform:translate(-50%,0); font-size:9px; color:var(--text-dim); white-space:nowrap;
  pointer-events:none; max-width:60px; overflow:hidden; text-overflow:ellipsis;
}
.cat-manage-list{display:flex; flex-direction:column; gap:8px; margin-bottom:14px; max-height:280px; overflow-y:auto;}
.cat-manage-row{display:flex; align-items:center; gap:9px;}
.cat-merge-select{font-size:11px; color:var(--text-dim); border:1px solid var(--border); border-radius:6px; padding:4px 6px; background:var(--surface); flex:none; max-width:88px;}
.cat-fixed-hint{font-size:10px; color:var(--text-faint); font-family:'IBM Plex Mono',monospace; flex:none; white-space:nowrap;}
.cat-dot{width:12px; height:12px; border-radius:50%; flex:none;}
.cat-name-input{flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:'IBM Plex Sans',sans-serif; background:#fff; color:var(--text);}
.cat-name-input:focus{outline:none; border-color:var(--accent);}
.cat-add-row{display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--border-soft);}
.cat-add-row input, .cat-add-row select{flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:'IBM Plex Sans',sans-serif; background:#fff; color:var(--text);}
.cat-add-row input:focus, .cat-add-row select:focus{outline:none; border-color:var(--accent);}
.tl-fields-list{display:flex; flex-direction:column; gap:8px;}
.tl-field-row{display:flex; flex-direction:column; gap:8px; padding:12px; border:1px solid var(--border-soft); border-radius:10px; background:var(--surface-2);}
.tl-field-top{display:flex; gap:8px; align-items:center;}
.tl-field-label{flex:1; padding:8px 9px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; background:#fff; color:var(--text);}
.tl-field-value{width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:8px; font-size:13.5px; font-family:'IBM Plex Sans',sans-serif; background:#fff; color:var(--text); min-height:120px; resize:vertical; line-height:1.6; box-sizing:border-box;}
.tl-field-label:focus, .tl-field-value:focus{outline:none; border-color:var(--accent);}
.geo-pick-list{display:flex; flex-direction:column; gap:6px; max-height:320px; overflow-y:auto; margin-bottom:6px;}
.geo-pick-row{text-align:left; padding:10px 12px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-size:13px; line-height:1.5; cursor:pointer; transition:.15s;}
.geo-pick-row:hover{border-color:var(--accent); background:var(--accent-soft); color:var(--accent);}
.tl-filter-chip{
  font-size:11px; font-family:'IBM Plex Mono',monospace; padding:4px 10px; border-radius:20px;
  border:1px solid var(--border); color:var(--text-dim); cursor:pointer; transition:.15s; background:var(--surface);
}
.tl-filter-chip:hover{border-color:var(--text-faint); color:var(--text);}
.tl-filter-chip.active{background:var(--chip-color, var(--text)); border-color:var(--chip-color, var(--text)); color:#fff;}
.tl-map-cta{margin-top:12px;}
.hz-timeline-wrap{padding:6px 4px 20px; overflow:hidden;}
.hz-timeline{position:relative; height:76px; overflow-x:auto; overflow-y:hidden; cursor:grab; -webkit-overflow-scrolling:touch; transition:height .15s ease;}
.hz-timeline.grabbing{cursor:grabbing;}
.hz-timeline::-webkit-scrollbar{height:4px;}
.hz-timeline::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}
.hz-line{position:absolute; top:6px; left:0; height:2px; background:var(--border-soft);}
.hz-point{position:absolute; top:0; display:flex; flex-direction:column; align-items:center; user-select:none; transform:translateX(-50%); width:130px;}
.hz-dot{width:13px;height:13px;border-radius:50%; background:var(--text); border:2px solid var(--surface); box-shadow:0 0 0 1.5px var(--text); flex:none; transition:.15s;}
.hz-dot-add{display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; color:var(--text-faint); background:transparent; border:2px dashed var(--text-faint); box-shadow:none;}
.hz-point.add:hover .hz-dot-add{border-color:var(--accent); color:var(--accent);}
.hz-point[data-year]{cursor:pointer;}
.hz-point[data-year]:hover .hz-year-dot{transform:scale(1.2);}
.hz-point.open .hz-year-dot{background:var(--accent); box-shadow:0 0 0 1.5px var(--accent);}
.hz-point.open .hz-year-label{color:var(--accent);}
.hz-year-count{
  display:inline-flex; align-items:center; justify-content:center; margin-left:4px;
  min-width:14px; height:14px; padding:0 3px; border-radius:8px;
  background:var(--accent-soft); color:var(--accent); font-size:9px; font-family:'IBM Plex Mono',monospace;
  vertical-align:middle;
}
.hz-point.open .hz-year-count{background:var(--accent); color:#fff;}
.hz-date{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text-dim); white-space:nowrap; margin-top:6px;}
.hz-year-label{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:12.5px; color:var(--text); margin-top:6px;}
.hz-point.add .hz-date{color:var(--text-faint);}
.hz-point.add:hover .hz-date{color:var(--accent);}
.tl-period{position:absolute; top:4px; height:24px; cursor:pointer; transform:translateX(0);}
.tl-period-bracket{position:absolute; bottom:0; left:0; right:0; height:9px; border-left:2px solid var(--period-color); border-right:2px solid var(--period-color); border-top:2px solid var(--period-color); border-radius:4px 4px 0 0; transition:.12s;}
.tl-period:hover .tl-period-bracket{border-width:2.5px;}
.tl-period-label{
  position:absolute; top:-4px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:600; white-space:nowrap; color:var(--period-color);
  background:var(--surface); padding:0 5px; max-width:150px; overflow:hidden; text-overflow:ellipsis;
}
.tl-period:hover .tl-period-label{text-decoration:underline;}
/* 矩形填充样式（目前用在"工作"类别），比括弧更直观一眼看出这一段时间 */
.tl-period.tl-period-fill .tl-period-bracket{
  top:0; height:100%; background:var(--period-color); border:none; border-radius:6px; opacity:.88;
}
.tl-period.tl-period-fill .tl-period-label{
  top:50%; transform:translate(-50%,-50%); color:#fff; background:transparent; z-index:1;
}
/* "住所"类别单独放在轴线下方一块区域，颜色调淡一点，跟轴线上方其它类别的矩形区分开 */
.tl-period.tl-period-soft .tl-period-bracket{opacity:.28;}
.tl-period.tl-period-soft .tl-period-label{color:var(--text);}
.hz-year-connector{position:absolute; width:1px; background:var(--border); opacity:.5; pointer-events:none; z-index:0;}
.tlv-period{
  display:flex; align-items:baseline; gap:6px; padding:3px 0 3px 2px; cursor:pointer; font-size:12px;
}
.tlv-period-bracket{color:var(--period-color); font-weight:700; font-size:13px;}
.tlv-period-label{color:var(--period-color); font-weight:600;}
.tlv-period:hover .tlv-period-label{text-decoration:underline;}
.tlv-period.tlv-period-fill{background:var(--period-color); border-radius:6px; padding:4px 10px;}
.tlv-period.tlv-period-fill .tlv-period-bracket{display:none;}
.tlv-period.tlv-period-fill .tlv-period-label, .tlv-period.tlv-period-fill .hz-leaf-date{color:#fff;}
.tlv-period.tlv-period-fill:hover .tlv-period-label{text-decoration:underline;}
/* 补充内容的悬浮提示，类似 Excel 单元格注释：只有真的有补充字段的经历才会出现小圆点提示、鼠标移上去才展开 */
.tl-tip-wrap{position:relative; display:inline-block; cursor:help;}
/* 提示框用 position:fixed 单独挂在 body 上，用 JS 算坐标显示——
   不这样做的话，嵌在横向时间轴（overflow-y:hidden 的滚动容器）里的提示框会被裁掉，鼠标移上去看不到内容 */
.tl-tooltip{
  display:none; position:fixed;
  background:#FFF6D6; color:#4a4530; border:1px solid #E3D48A; border-radius:6px;
  padding:7px 9px; font-size:11px; line-height:1.6; white-space:normal; width:max-content; max-width:220px;
  box-shadow:var(--shadow-lg); z-index:500; text-align:left; font-weight:400;
}
.tl-tip-row b{color:#8a7420; font-weight:600;}
.hz-year-branches{
  display:flex; flex-direction:column; align-items:flex-start; gap:5px;
  margin-top:9px; padding-left:12px; border-left:1.5px solid var(--border-soft); max-width:150px;
}
.hz-leaf{
  position:relative; font-size:10.5px; color:var(--text); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; max-width:140px;
  cursor:pointer; padding:2px 6px; border-radius:4px; border:1px solid transparent; transition:.12s;
}
.hz-leaf::before{content:""; position:absolute; left:-12px; top:10px; width:9px; height:1.5px; background:var(--border-soft);}
.hz-leaf:hover{background:var(--accent-soft); color:var(--accent); border-color:transparent;}
.hz-leaf-dot{display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:middle; flex:none;}
.hz-leaf-date{font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--text-dim); margin-right:4px;}
.hz-leaf:hover .hz-leaf-date{color:var(--accent);}
.hz-detail{margin-top:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; box-shadow:var(--shadow);}
.hz-detail-table{width:100%; border-collapse:collapse; font-size:13px;}
.hz-detail-table th{width:56px; text-align:left; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:500; padding:6px 10px 6px 0; vertical-align:top; white-space:nowrap;}
.hz-detail-table td{padding:6px 0; color:var(--text); line-height:1.6; border-bottom:1px solid var(--border-soft);}
.hz-detail-table tr:last-child td{border-bottom:none}
.bi-edit-table{width:auto; border-collapse:collapse; font-size:13px; text-align:left;}
.bi-edit-table .bi-row th, .bi-edit-table .bi-row td{padding:2px 4px; border-bottom:1px solid var(--border-soft); vertical-align:middle; text-align:left;}
.bi-edit-table .bi-row:last-of-type th, .bi-edit-table .bi-row:last-of-type td{border-bottom:none;}
.bi-handle-cell{width:18px; padding:0 !important;}
.bi-input{
  width:100%; border:1px solid transparent; background:transparent; font:inherit; color:inherit;
  padding:5px 6px; border-radius:5px; transition:.12s; text-align:left;
}
.bi-input.bi-label{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--text-dim); font-weight:500; width:80px;}
.bi-input.bi-value{color:var(--text); width:200px;}
.bi-input.bi-label:hover{background:var(--surface-2);}
.bi-input:focus{outline:none; border-color:var(--accent); background:#fff;}
.bi-del{width:22px; padding:0 !important;}
.bi-del-btn{
  width:20px; height:20px; border:none; background:transparent; color:var(--text-faint);
  border-radius:5px; font-size:10px; opacity:0; transition:.12s;
}
.bi-row:hover .bi-del-btn{opacity:1;}
.bi-del-btn:hover{background:var(--danger-soft); color:var(--danger);}
.bi-add-row td{padding:8px 4px 2px; border-bottom:none;}

/* family tree: 经典的节点+连线家谱图 */
.fam-tree-wrap{overflow:auto; padding:8px 0 4px; max-height:70vh; border:1px solid var(--border-soft); border-radius:12px;}
.fam-tree-canvas{position:relative; margin:10px;}
.fam-lines{position:absolute; top:0; left:0; pointer-events:none; z-index:0; overflow:visible;}
.fam-line{stroke:#B7B4AA; stroke-width:1.5; fill:none;}
.fam-line-spouse{stroke:#A0527A; stroke-width:1.5; stroke-dasharray:3,3; fill:none;}
.fam-line-pending{stroke:var(--accent); stroke-width:1.5; stroke-dasharray:4,3; fill:none;}
.fam-line-brace{stroke:#B7B4AA; stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round;}
.fam-spouse-label-layer{position:absolute; top:0; left:0; z-index:2;}
.fam-spouse-label{
  position:absolute; transform:translate(-50%,-50%); font-size:10.5px; color:#A0527A;
  background:var(--surface); border:1px solid #A0527A; border-radius:8px; padding:1px 7px;
  min-width:20px; text-align:center; cursor:text; white-space:nowrap; pointer-events:auto;
}
.fam-spouse-label:focus{outline:none; background:var(--surface-2);}
.fam-pending-layer{position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;}
.fam-pending-btn{
  position:absolute; width:22px; height:22px; border-radius:50%; pointer-events:auto;
  border:1.5px dashed var(--accent); background:var(--accent-soft); color:var(--accent);
  font-size:13px; line-height:1; z-index:3; animation:famPendingPulse 1.4s ease-in-out infinite;
}
.fam-pending-btn:hover{background:var(--accent); color:#fff;}
@keyframes famPendingPulse{0%,100%{box-shadow:0 0 0 0 rgba(47,93,80,.25);} 50%{box-shadow:0 0 0 5px rgba(47,93,80,0);}}
.fam-node{
  position:absolute; background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:8px 16px; box-shadow:var(--shadow); cursor:grab; text-align:center;
  min-width:64px; min-height:38px; max-width:360px; max-height:220px;
  resize:both; overflow:hidden;
  transition:border-color .12s, box-shadow .12s;
  z-index:1; touch-action:none; user-select:none;
}
.fam-node:active{cursor:grabbing;}
.fam-node:hover{border-color:var(--accent); box-shadow:var(--shadow-lg);}
.fam-node-relation, .fam-node-name{
  display:block; width:100%; box-sizing:border-box; text-align:center; cursor:text;
  border:1px solid transparent; background:transparent; border-radius:5px; padding:1px 3px;
  font-family:'IBM Plex Sans',sans-serif;
}
.fam-node-relation{font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--text-dim);}
.fam-node-name{font-size:12.5px; font-weight:600; color:var(--text); margin-top:1px; white-space:nowrap;}
.fam-node-relation:hover, .fam-node-name:hover{border-color:var(--border);}
.fam-node-relation:focus, .fam-node-name:focus{outline:none; border-color:var(--accent); background:var(--surface-2);}
.fam-hint{font-size:11px; color:var(--text-faint); margin-top:8px; line-height:1.6;}
.fam-node-del, .fam-node-link{
  position:absolute; top:2px; width:15px; height:15px; border:none; background:transparent;
  color:var(--text-faint); font-size:8px; border-radius:4px; opacity:0; transition:.12s;
}
.fam-node-del{right:2px;}
.fam-node-link{left:2px; font-size:9px;}
.fam-node:hover .fam-node-del, .fam-node:hover .fam-node-link{opacity:1;}
.fam-node-del:hover{background:var(--danger-soft); color:var(--danger);}
.fam-node-link:hover{background:var(--accent-soft); color:var(--accent);}
.fam-node-add, .fam-node-add-child, .fam-node-add-sib, .fam-node-add-spouse{
  position:absolute; width:16px; height:16px;
  border:1.5px solid var(--border); background:var(--surface); color:var(--text-faint);
  border-radius:50%; font-size:10px; line-height:1; opacity:0; transition:.12s; z-index:2;
}
.fam-node-add{left:50%; bottom:-9px; transform:translateX(-50%);}
.fam-node-add-child{left:50%; top:-9px; transform:translateX(-50%);}
.fam-node-add-sib{top:50%; right:-9px; transform:translateY(-50%);}
.fam-node-add-spouse{top:50%; left:-9px; transform:translateY(-50%);}
.fam-node:hover .fam-node-add, .fam-node:hover .fam-node-add-child, .fam-node:hover .fam-node-add-sib, .fam-node:hover .fam-node-add-spouse{opacity:1;}
.fam-node-add:hover, .fam-node-add-child:hover, .fam-node-add-sib:hover, .fam-node-add-spouse:hover{border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
.fam-node-add-spouse:hover{border-color:#A0527A; color:#A0527A; background:#F7ECF1;}
.fam-node-add.active, .fam-node-add-child.active, .fam-node-add-sib.active, .fam-node-add-spouse.active{
  opacity:1; border-color:var(--accent); color:var(--accent); background:var(--accent-soft);
}
.fam-parent-list{display:flex; flex-direction:column; gap:6px; max-height:180px; overflow-y:auto; padding:2px;}
.fam-parent-opt{display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;}
.hz-detail-actions{display:flex; gap:8px; margin-top:12px; justify-content:flex-end;}
.hz-detail-hint{margin-top:14px; padding:22px; text-align:center; color:var(--text-faint); font-size:12.5px; border:1px dashed var(--border); border-radius:12px;}

/* vertical timeline */
.tl-vertical{position:relative; padding-left:24px;}
.tl-vertical::before{content:""; position:absolute; left:5px; top:6px; bottom:20px; width:1.5px; background:var(--border-soft);}
.tlv-year-row{position:relative; cursor:pointer; padding:6px 0; user-select:none;}
.tlv-year-row:hover .tlv-year-label{color:var(--accent);}
.tlv-year-row::before{
  content:""; position:absolute; left:-24px; top:9px; width:11px; height:11px; border-radius:50%;
  background:var(--text); border:2px solid var(--surface); box-shadow:0 0 0 1.5px var(--text);
}
.tlv-year-row.open::before{background:var(--accent); box-shadow:0 0 0 1.5px var(--accent);}
.tlv-year-row.add::before{background:transparent; border:2px dashed var(--text-faint); box-shadow:none;}
.tlv-year-label{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; color:var(--text);}
.tlv-year-row.open .tlv-year-label{color:var(--accent);}
.tlv-year-row.add .tlv-year-label{font-weight:600; color:var(--text-faint); font-family:'IBM Plex Sans',sans-serif; font-size:13px;}
.tlv-branches{display:flex; flex-direction:column; gap:5px; margin:4px 0 10px; padding-left:14px; border-left:1.5px solid var(--border-soft);}
.tlv-leaf{
  position:relative; font-size:12px; color:var(--text); cursor:pointer;
  padding:4px 8px; border-radius:6px; border:1px solid transparent; transition:.12s;
}
.tlv-leaf::before{content:""; position:absolute; left:-14px; top:12px; width:11px; height:1.5px; background:var(--border-soft);}
.tlv-leaf:hover{background:var(--accent-soft); color:var(--accent);}
.tlv-leaf:hover .hz-leaf-date{color:var(--accent);}

/* world map (真实的 Leaflet + OpenStreetMap 地图) */
.map-wrap{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; box-shadow:var(--shadow); position:relative;}
.leaflet-map-el{width:100%; height:420px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2); z-index:1;}
.geo-pin-icon{background:transparent; border:none;}
.map-fallback{padding:40px 20px; text-align:center; color:var(--text-faint); font-size:12.5px; border:1px dashed var(--border); border-radius:10px;}
.map-legend{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
.map-chip{font-size:11px; font-family:'IBM Plex Mono',monospace; padding:4px 10px; border-radius:20px; background:var(--accent-soft); color:var(--accent); cursor:pointer;}
.map-chip.unmapped{background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border); cursor:default;}
.map-note{font-size:11px; color:var(--text-faint); margin-top:12px; line-height:1.6;}
.map-popup-btn{font-size:11.5px; color:var(--accent); text-decoration:underline; cursor:pointer; border:none; background:none; padding:0; font-family:'IBM Plex Sans',sans-serif;}

/* memorial events */
.memorial-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px;}
.memorial-card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:15px 16px; box-shadow:var(--shadow); position:relative;}
.memorial-card .mname{font-size:14.5px; font-weight:600; margin-bottom:4px; padding-right:50px;}
.memorial-card .mdate{font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; margin-bottom:10px;}
.memorial-card .mcountdown{font-size:13px; color:var(--accent); font-weight:600;}
.memorial-card .mnote{font-size:12px; color:var(--text-dim); margin-top:8px; line-height:1.5;}
.memorial-card .row-actions{position:absolute; top:13px; right:13px;}

/* declutter */
.declutter-list{display:flex; flex-direction:column; gap:8px;}
.declutter-row{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; box-shadow:var(--shadow);}
.declutter-row .dname{font-size:13.5px; font-weight:600;}
.row-open-link{cursor:pointer;}
.row-open-link:hover{color:var(--accent);}
.declutter-row .dnote{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
.status-badge{font-size:11px; font-family:'IBM Plex Mono',monospace; padding:4px 10px; border-radius:20px; border:1px solid var(--border); cursor:pointer; white-space:nowrap; flex:none;}
.status-badge.s0{background:var(--surface-2); color:var(--text-dim);}
.status-badge.s1{background:var(--accent-soft); color:var(--accent); border-color:transparent;}
.status-badge.s2{background:var(--border-soft); color:var(--text-faint); text-decoration:line-through; border-color:transparent;}

/* contacts */
.contact-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px;}
.contact-card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px; box-shadow:var(--shadow); position:relative;}
.contact-card .initial{width:34px;height:34px;border-radius:50%;background:var(--surface-2);color:var(--text);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;margin-bottom:10px;font-size:14px;}
.contact-card h4{margin:0 0 2px; font-size:14.5px;}
.contact-card .rel{font-size:11px; color:var(--accent); font-family:'IBM Plex Mono',monospace; margin-bottom:8px;}
.contact-card .phone{font-size:13px; font-family:'IBM Plex Mono',monospace; color:var(--text);}
.contact-card .note{font-size:12px; color:var(--text-dim); margin-top:6px; line-height:1.5}
.contact-card .row-actions{position:absolute; top:14px; right:14px;}

/* modal */
.modal-mask{position:fixed; inset:0; background:rgba(20,20,15,.35); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
.modal{background:var(--surface); color:var(--text); border-radius:14px; width:100%; max-width:440px; padding:26px 26px 22px; box-shadow:0 24px 60px rgba(0,0,0,.16); max-height:88vh; overflow:auto; border:1px solid var(--border);}
.modal h3{margin:0 0 18px; font-size:18px;}
.field{margin-bottom:14px;}

/* 优先用 Claude Artifacts 的持久化存储（window.storage），这是发布/分享场景下官方支持、真正可靠的持久化方式；
   本地直接打开这个 html 文件时 window.storage 不存在，自动回退到浏览器 localStorage */
var hasArtifactStorage = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
var storageAvailable = true;
function normalizeData(d){
  d.settings = d.settings || {};
  d.settings.moduleView = d.settings.moduleView || "list";
  d.settings.homeOrder = (d.settings.homeOrder && d.settings.homeOrder.length) ? d.settings.homeOrder : ["quickaccess","timeline"];
  d.settings.homeOrder = d.settings.homeOrder.filter(function(k){ return k!=="basicinfo"; });
  d.settings.quickAccessIds = d.settings.quickAccessIds || [];
  if(d.settings.quickAccessIds.indexOf("basicinfo")===-1){ d.settings.quickAccessIds.unshift("basicinfo"); }
  d.settings.timelineViewByFilter = d.settings.timelineViewByFilter || {};
  if(d.settings.timelineOrientation || d.settings.timelineGranularity){
    if(!d.settings.timelineViewByFilter.all){
      d.settings.timelineViewByFilter.all = {
        orientation: d.settings.timelineOrientation || "horizontal",
        granularity: d.settings.timelineGranularity || "year"
      };
    }
    delete d.settings.timelineOrientation;
    delete d.settings.timelineGranularity;
  }
  d.settings.categoryViewMode = d.settings.categoryViewMode || "list";
  if(!d.settings.quickAccessIds){
    var hidden = d.settings.hiddenModules || [];
    d.settings.quickAccessIds = MODULES.filter(function(m){ return hidden.indexOf(m.id)===-1; }).map(function(m){ return m.id; });
  }
  delete d.settings.hiddenModules;
  d.labels = d.labels || {};
  d.timelineCategories = (d.timelineCategories && d.timelineCategories.length) ? d.timelineCategories : JSON.parse(JSON.stringify(DEFAULT_TL_CATEGORIES));
  /* "住所"类别是后来加的，已经有数据的老用户不会自动拿到 DEFAULT 列表，这里单独补一条，不影响用户已有的自定义类别 */
  if(!d.timelineCategories.some(function(c){return c.key==="residence";})){
    d.timelineCategories.push({key:"residence", label:"住所", color:"#3D7A99"});
  }
  d.lifeTimeline = d.lifeTimeline || [];
  d.memorialEvents = d.memorialEvents || [];
  d.declutterItems = d.declutterItems || [];
  d.customBoards = d.customBoards || [];
  d.basicInfo = (d.basicInfo && d.basicInfo.length) ? d.basicInfo : JSON.parse(JSON.stringify(DEFAULT_DATA.basicInfo));
  d.workTags = (d.workTags && d.workTags.length) ? d.workTags : JSON.parse(JSON.stringify(DEFAULT_WORK_TAGS));
  d.residenceTags = (d.residenceTags && d.residenceTags.length) ? d.residenceTags : JSON.parse(JSON.stringify(DEFAULT_RESIDENCE_TAGS));
  if(!d.familyMembers){
    if(d.familyTree && d.familyTree.length){
      var flat = [];
      d.familyTree.forEach(function(g){
        (g.members||[]).forEach(function(m){ flat.push({id:m.id||uid(), name:m.name||"", relation:m.relation||"", parentIds:[]}); });
      });
      d.familyMembers = flat.length ? flat : JSON.parse(JSON.stringify(DEFAULT_DATA.familyMembers));
    } else {
      d.familyMembers = JSON.parse(JSON.stringify(DEFAULT_DATA.familyMembers));
    }
  }
  delete d.familyTree;
  d.familySpouseLabels = d.familySpouseLabels || {};
  d.moduleCategories = d.moduleCategories || {};
  if(!d.moduleCategories.assets_type || !d.moduleCategories.assets_type.length){
    d.moduleCategories.assets_type = JSON.parse(JSON.stringify(DEFAULT_DATA.moduleCategories.assets_type));
  }
  d.assets = (d.assets||[]).map(migrateAssetItem);
  d.profile = d.profile || {name:"", avatarUrl:""};
  d.passwords = d.passwords || [];
  d.idPhotos = d.idPhotos || [];
  d.albumPhotos = d.albumPhotos || [];
  d.contacts = d.contacts || [];
  return d;
}
/* 把旧版资产字段（bank/type/holder/number/note）自动迁移成新的"标题+自定义字段"结构，不丢数据 */
function migrateAssetItem(a){
  if(a.fields && a.title!==undefined) return a;
  var fields = [];
  if(a.bank){ fields.push({id:uid(), label:"银行/机构", value:a.bank}); }
  if(a.type){ fields.push({id:uid(), label:"细分类型", value:a.type}); }
  if(a.holder){ fields.push({id:uid(), label:"持有人", value:a.holder}); }
  if(a.number){ fields.push({id:uid(), label:"卡号", value:a.number}); }
  if(a.note){ fields.push({id:uid(), label:"备注", value:a.note}); }
  return {
    id:a.id, title:a.bank||a.holder||"未命名资产",
    location:a.location||"", assetType:a.assetType||"",
    fields: fields
  };
}
var DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
function warnStorageOnce(){
  if(!storageAvailable) return;
  storageAvailable = false;
  toast("当前环境无法保存数据，改动只在这次打开期间有效，刷新或关闭后会丢失", 7000);
}
async function loadDataAsync(){
  var raw = null;
  if(hasArtifactStorage){
    try{
      var res = await window.storage.get(STORE_KEY, false);
      raw = res ? res.value : null;
    }catch(e){ raw = null; }
  } else {
    try{ raw = localStorage.getItem(STORE_KEY); }catch(e){ raw = null; }
  }
  if(!raw){ return null; }
  try{ return normalizeData(JSON.parse(raw)); }catch(e){ return null; }
}
function save(){
  var payload = JSON.stringify(DATA);
  if(hasArtifactStorage){
    window.storage.set(STORE_KEY, payload, false).catch(function(){ warnStorageOnce(); });
  } else {
    try{ localStorage.setItem(STORE_KEY, payload); }catch(e){ warnStorageOnce(); }
  }
}
function uid(){ return Math.random().toString(36).slice(2,9); }
/* 通用：把数组里 fromId 这一项挪到 targetId 那一项的位置（fromId/targetId 匹配元素的 id 或 key 字段） */
function reorderById(arr, fromId, targetId){
  var idx = function(id){ return arr.findIndex(function(x){ return x.id===id || x.key===id; }); };
  var from = idx(fromId), to = idx(targetId);
  if(from===-1 || to===-1 || from===to) return arr;
  var copy = arr.slice();
  var item = copy.splice(from,1)[0];
  copy.splice(to,0,item);
  return copy;
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

/* ---- 备份与恢复：导出/导入 JSON 文件，避免只依赖浏览器 localStorage 导致数据丢失 ---- */
window.openBackupModal = function(){
  var root=document.getElementById("modalRoot");
  root.innerHTML = '<div class="modal-mask" id="mmask"><div class="modal" style="max-width:380px">'+
    '<h3>备份与恢复</h3>'+
    '<div class="sub" style="margin-bottom:16px">所有数据只存在本机浏览器里：换设备、换浏览器、清缓存、或者改动这个文件的路径/文件名，数据都可能对不上。建议不定期导出一份 JSON 文件保存到别处。</div>'+
    '<button type="button" class="btn solid" style="width:100%;margin-bottom:10px" onclick="exportBackup()">⬇ 导出备份（下载 JSON 文件）</button>'+
    '<label class="btn ghost" style="width:100%;display:block;text-align:center;box-sizing:border-box;cursor:pointer">⬆ 导入备份（选择之前导出的 JSON 文件）'+
      '<input type="file" accept="application/json,.json" style="display:none" onchange="importBackupFile(this)">'+
    '</label>'+
    '<div class="modal-actions"><button type="button" class="btn ghost" onclick="closeModal()">关闭</button></div>'+
    '</div></div>';
  document.getElementById("mmask").addEventListener("click", function(e){ if(e.target.id==="mmask") closeModal(); });
};
window.exportBackup = function(filenamePrefix){
  var payload = JSON.stringify(DATA, null, 2);
  var blob = new Blob([payload], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  var stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  a.href = url; a.download = (filenamePrefix||"private-space-backup")+"-"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  if(!filenamePrefix){ toast("已导出备份文件"); }
};
window.importBackupFile = function(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var parsed;
    try{ parsed = JSON.parse(e.target.result); }catch(err){ toast("这不是一个有效的 JSON 文件"); return; }
    if(!parsed || typeof parsed!=="object" || Array.isArray(parsed)){ toast("文件内容格式不对，不像是这个网页导出的备份"); return; }
    confirmDelete("导入会覆盖当前浏览器里的所有数据（密码、资产、时间线等）。为防止手滑，会先自动帮你下载一份当前数据的安全备份，再继续导入。确定要用这份备份恢复吗？", function(){
      exportBackup("private-space-before-import-safety-backup");
      DATA = normalizeData(parsed);
      save(); render(); toast("已恢复备份（导入前的数据也已自动下载了一份安全备份）", 5000);
    }, "确认导入备份", "确定恢复");
  };
  reader.readAsText(file);
  input.value = "";
};

window.go = function(view){
  VIEW = view;
  if(view==="home"){
    document.getElementById("crumb").textContent = "首页";
    document.getElementById("crumb").onclick = null;
    document.getElementById("crumb").style.cursor = "default";
  } else {
    var key = "module:"+view;
    if(!findTab(key)){ openTabs.push({key:key, type:"module", id:view}); }
    activeTabKey = key;
    document.getElementById("crumb").textContent = "首页 / " + labelFor(view);
    document.getElementById("crumb").onclick = function(){ go("home"); };
    document.getElementById("crumb").style.cursor = "pointer";
  }
  render();
  window.scrollTo({top:0,behavior:"smooth"});

/* 通用横向拖动滚动：给任意容器加上鼠标按住拖动横向滚动的能力（触屏本身就能左右滑动） */
function setupDragScroll(id){
  var el = document.getElementById(id);
  if(!el) return;
  var isDown=false, startX=0, startScroll=0;
  el.addEventListener("pointerdown", function(e){
    isDown=true; startX=e.clientX; startScroll=el.scrollLeft; el.classList.add("grabbing");
  });
  el.addEventListener("pointermove", function(e){
    if(!isDown) return;
    el.scrollLeft = startScroll - (e.clientX - startX);
  });
  function endDrag(){ isDown=false; el.classList.remove("grabbing"); }
  el.addEventListener("pointerup", endDrag);
  el.addEventListener("pointerleave", endDrag);
  el.addEventListener("pointercancel", endDrag);
}
function setupHzDrag(){
  var el = document.getElementById("hzTimeline");
  if(!el) return;
  var isDown=false, startX=0, startScroll=0, moved=false;
  el.addEventListener("pointerdown", function(e){
    isDown=true; moved=false; startX=e.clientX; startScroll=el.scrollLeft;
    el.classList.add("grabbing");
  });
  el.addEventListener("pointermove", function(e){
    if(!isDown) return;
    var dx = e.clientX-startX;
    if(Math.abs(dx)>4) moved=true;
    el.scrollLeft = startScroll - dx;
  });
  function endDrag(){ isDown=false; el.classList.remove("grabbing"); }
  el.addEventListener("pointerup", endDrag);
  el.addEventListener("pointerleave", endDrag);
  el.addEventListener("pointercancel", endDrag);
  el.addEventListener("click", function(e){
    if(moved) return;
    var period = e.target.closest ? e.target.closest(".tl-period") : null;
    if(period){ openTimelineEntry(period.getAttribute("data-id")); return; }
    var leaf = e.target.closest ? e.target.closest(".hz-leaf") : null;
    if(leaf){ openTimelineEntry(leaf.getAttribute("data-id")); return; }
    var addPt = e.target.closest ? e.target.closest(".hz-point.add") : null;
    if(addPt){ editTimelineEntry(); return; }
    var yearPt = e.target.closest ? e.target.closest(".hz-point[data-year]") : null;
    if(yearPt){ toggleYearExpand(yearPt.getAttribute("data-year")); }
  });
}

/* ---- 家庭关系树状图：真正的父母子女连线，自动按辈分分行，用SVG画连接线（经典家谱图那种） ---- */
function computeFamilyGenerations(members){
  var byId = {}; members.forEach(function(p){ byId[p.id]=p; });
  var depthCache = {};
  function depth(id, visiting){
    if(depthCache[id]!==undefined) return depthCache[id];
    visiting = visiting || {};
    if(visiting[id]){ return 0; }
    visiting[id] = true;
    var p = byId[id];
    if(!p || !p.parentIds || !p.parentIds.length){ depthCache[id]=0; return 0; }
    var maxD = -1;
    p.parentIds.forEach(function(pid){ if(byId[pid]){ maxD = Math.max(maxD, depth(pid, visiting)); } });
    var d = maxD+1;
    depthCache[id] = d;
    return d;
  }
  var rows = {};
  members.forEach(function(p){ var d = depth(p.id); rows[d] = rows[d] || []; rows[d].push(p); });
  var maxDepth = 0;
  Object.keys(rows).forEach(function(k){ maxDepth = Math.max(maxDepth, parseInt(k,10)); });
  var rowsArr = [];
  for(var i=0;i<=maxDepth;i++){ rowsArr.push(rows[i]||[]); }
  return rowsArr;
}
/* 只给还没有位置的成员算一个初始位置（自己在上，祖辈在下），算完就存到数据里，
   之后就完全自由拖动，不再受行/列限制 */
function ensureFamilyPositions(){
  var members = DATA.familyMembers || [];
  var needsLayout = members.filter(function(p){ return typeof p.x!=="number" || typeof p.y!=="number"; });
  if(!needsLayout.length) return false;
  var genRows = computeFamilyGenerations(members).slice().reverse();
  genRows.forEach(function(row, ri){
    row.forEach(function(p, ci){
      if(typeof p.x!=="number" || typeof p.y!=="number"){
        p.x = ci*128 + 30;
        p.y = ri*110 + 24;
      }
    });
  });
  return true;
}

function famNodeDragMove(e){

    var p = (DATA.familyMembers||[]).filter(function(x){return x.id===__famDrag.id;})[0];

/* 算出连线跟方框边缘的交点（沿着两个中心点的连线方向），这样线永远贴着方框边出发，
   不管方框多大、拖到哪个方向，线都会自动指向正确的方向，不会穿过方框内部 */
function famRectEdgePoint(rect, cr, dirX, dirY){
  var cx = rect.left + rect.width/2 - cr.left, cy = rect.top + rect.height/2 - cr.top;
  if(!dirX && !dirY) return {x:cx, y:cy};
  var hw = rect.width/2, hh = rect.height/2;
  var scale = Math.min(hw/(Math.abs(dirX)||1e-6), hh/(Math.abs(dirY)||1e-6));
  return {x:cx+dirX*scale, y:cy+dirY*scale};
}
/* 重叠时段自动分两行：短的那段优先占用额外的那一行，长的留在基础行；单条不重叠的就固定在基础行。
   工作/学校板块、以及"全部"矩阵图里的工作/学校两行都靠这个函数决定每条经历该放第几行 */
function packLanesWithOverflow(list){
  list.sort(function(a,b){ return a.x1-b.x1; });
  var groups = [], curGroup = null, curGroupEnd = -Infinity;
  list.forEach(function(m){
    if(curGroup && m.x1 < curGroupEnd){ curGroup.push(m); curGroupEnd = Math.max(curGroupEnd, m.x2); }
    else { curGroup=[m]; groups.push(curGroup); curGroupEnd = m.x2; }
  });
  var maxLane = 0;
  groups.forEach(function(group){
    if(group.length===1){ group[0].lane = "base"; return; }
    var sorted = group.slice().sort(function(a,b){ return a.width-b.width; });
    var laneEnds = [];
    sorted.forEach(function(m){
      var lane = 0;
      while(lane<1 && laneEnds[lane]!==undefined && laneEnds[lane] > m.x1) lane++;
      laneEnds[lane] = m.x2 + 6;
      m.lane = lane;
      maxLane = Math.max(maxLane, lane);
    });
  });
  list.forEach(function(m){ if(m.lane==="base"){ m.lane = maxLane; } });
  return maxLane;
}
function familySpousePairKey(aId, bId){ return [aId, bId].sort().join("|"); }
/* 生成一条真正的"大括号"曲线路径：x1,y1 到 x2,y2 是括号两端的端点，w 是尖角凸出的深度，q 控制弧度胖瘦 */
function makeCurlyBracePath(x1,y1,x2,y2,w,q){
  var dx = x1-x2, dy = y1-y2;
  var len = Math.sqrt(dx*dx+dy*dy) || 1;
  dx/=len; dy/=len;
  var qx1 = x1 + q*w*dy, qy1 = y1 - q*w*dx;
  var qx2 = (x1 - .25*len*dx) + (1-q)*w*dy, qy2 = (y1 - .25*len*dy) - (1-q)*w*dx;
  var tx1 = (x1 - .5*len*dx) + w*dy, ty1 = (y1 - .5*len*dy) - w*dx;
  var qx3 = x2 + q*w*dy, qy3 = y2 - q*w*dx;
  var qx4 = (x1 - .75*len*dx) + (1-q)*w*dy, qy4 = (y1 - .75*len*dy) - (1-q)*w*dx;
  return "M "+x1+" "+y1+" Q "+qx1+" "+qy1+" "+qx2+" "+qy2+" T "+tx1+" "+ty1+
    " M "+x2+" "+y2+" Q "+qx3+" "+qy3+" "+qx4+" "+qy4+" T "+tx1+" "+ty1;
}
function drawFamilyLines(){
  var canvas = document.getElementById("famTreeCanvas");
  var svg = document.getElementById("famLinesSvg");
  if(!canvas || !svg || !canvas.getBoundingClientRect) return;
  var cr = canvas.getBoundingClientRect();
  if(!cr.width || !cr.height) return;
  svg.setAttribute("width", cr.width);
  svg.setAttribute("height", cr.height);
  svg.setAttribute("viewBox", "0 0 "+cr.width+" "+cr.height);
  var defs = '<defs>'+
    '<marker id="famArrow" markerWidth="7" markerHeight="7" refX="5.5" refY="2.5" orient="auto"><path d="M0,0 L5.5,2.5 L0,5 Z" fill="#B7B4AA"/></marker>'+
    '<marker id="famArrowPending" markerWidth="7" markerHeight="7" refX="5.5" refY="2.5" orient="auto"><path d="M0,0 L5.5,2.5 L0,5 Z" fill="#2F5D50"/></marker>'+
  '</defs>';
  var svgHtml = defs;
  /* 先把每对配偶的连线画出来，同时记下中点位置——大括号要从这个中点往下牵 */
  var spouseMid = {};
  var drawnPairs = {};
  (DATA.familyMembers||[]).forEach(function(p){
    (p.spouseIds||[]).forEach(function(sid){
      var pairKey = familySpousePairKey(p.id, sid);
      if(drawnPairs[pairKey]) return;
      drawnPairs[pairKey] = true;
      var aEl = document.getElementById("famnode-"+p.id), bEl = document.getElementById("famnode-"+sid);
      if(!aEl || !bEl) return;
      var ar = aEl.getBoundingClientRect(), br = bEl.getBoundingClientRect();
      var acx = ar.left + ar.width/2 - cr.left, acy = ar.top + ar.height/2 - cr.top;
      var bcx = br.left + br.width/2 - cr.left, bcy = br.top + br.height/2 - cr.top;
      var dx = bcx-acx, dy = bcy-acy;
      var from = famRectEdgePoint(ar, cr, dx, dy);
      var to = famRectEdgePoint(br, cr, -dx, -dy);
      svgHtml += '<line x1="'+from.x+'" y1="'+from.y+'" x2="'+to.x+'" y2="'+to.y+'" class="fam-line-spouse"/>';
      spouseMid[pairKey] = {x:(from.x+to.x)/2, y:(from.y+to.y)/2, bottomY:Math.max(ar.bottom,br.bottom)-cr.top};
    });
  });
  /* 亲子关系：如果两个父母正好是夫妻，就用大括号从夫妻中点一起牵出所有孩子（xmind 那种分支感）；
     否则（单亲，或两个父母没登记为配偶）还是画各自一条直线，跟原来一样 */
  var coupleGroups = {};
  (DATA.familyMembers||[]).forEach(function(p){
    if(!p.parentIds || !p.parentIds.length) return;
    var childEl = document.getElementById("famnode-"+p.id);
    if(!childEl) return;
    var chr = childEl.getBoundingClientRect();
    var childCx = chr.left + chr.width/2 - cr.left, childCy = chr.top + chr.height/2 - cr.top;
    var pids = p.parentIds;
    var coupleKey = pids.length===2 ? familySpousePairKey(pids[0], pids[1]) : null;
    if(coupleKey && spouseMid[coupleKey]){
      coupleGroups[coupleKey] = coupleGroups[coupleKey] || {mid:spouseMid[coupleKey], children:[]};
      var topPoint = famRectEdgePoint(chr, cr, 0, -1);
      coupleGroups[coupleKey].children.push(topPoint);
    } else {
      pids.forEach(function(pid){
        var pe = document.getElementById("famnode-"+pid);
        if(!pe) return;
        var pr = pe.getBoundingClientRect();
        var parentCx = pr.left + pr.width/2 - cr.left, parentCy = pr.top + pr.height/2 - cr.top;
        var dx = parentCx-childCx, dy = parentCy-childCy;
        var from = famRectEdgePoint(chr, cr, dx, dy);
        var to = famRectEdgePoint(pr, cr, -dx, -dy);
        /* 直线，箭头指向父/母那一端，代表"本人 → 父/母"这条关系 */
        svgHtml += '<line x1="'+from.x+'" y1="'+from.y+'" x2="'+to.x+'" y2="'+to.y+'" class="fam-line" marker-end="url(#famArrow)"/>';
      });
    }
  });
  Object.keys(coupleGroups).forEach(function(key){
    var g = coupleGroups[key];
    if(!g.children.length) return;
    var baseY = g.mid.bottomY + 26;
    if(g.children.length===1){
      /* 只有一个孩子用不上大括号，直接一条线牵下去就好 */
      var only = g.children[0];
      svgHtml += '<line x1="'+g.mid.x+'" y1="'+g.mid.y+'" x2="'+only.x+'" y2="'+only.y+'" class="fam-line-brace"/>';
      return;
    }
    var braceDepth = 12;
    var xs = g.children.map(function(c){ return c.x; }).concat([g.mid.x]);
    var minX = Math.min.apply(Math, xs), maxX = Math.max.apply(Math, xs);
    if(maxX-minX < 40){ minX -= 20; maxX += 20; }
    var midX = (minX+maxX)/2, tipY = baseY - braceDepth;
    /* 真正的大括号曲线，尖角朝上顶着父母那条线，两端刚好落在孩子们所在的那条基线上 */
    svgHtml += '<path d="'+makeCurlyBracePath(maxX, baseY, minX, baseY, braceDepth, 0.5)+'" class="fam-line-brace" fill="none"/>';
    svgHtml += '<line x1="'+g.mid.x+'" y1="'+g.mid.y+'" x2="'+midX+'" y2="'+tipY+'" class="fam-line-brace"/>';
    g.children.forEach(function(c){
      svgHtml += '<line x1="'+c.x+'" y1="'+baseY+'" x2="'+c.x+'" y2="'+c.y+'" class="fam-line-brace"/>';
    });
  });
  svg.innerHTML = svgHtml;
  renderFamilySpouseLabels(spouseMid);
}
/* 配偶连线中间可以点开填一个关系词（比如"夫妻"），存在 DATA.familySpouseLabels 里，key 是两人 id 排序后拼起来 */

/* 待确认的"箭头"：只是预览用的虚线+箭头，指向按了哪个方向的空白处；点箭头本身（fam-pending-btn）才真正生成节点。
   必须在 drawFamilyLines() 之后调用，因为那个函数会整个替换掉 svg 内容。 */
function renderPendingArrows(){
  var canvas = document.getElementById("famTreeCanvas");
  var svg = document.getElementById("famLinesSvg");
  var layer = document.getElementById("famPendingLayer");
  if(!canvas || !svg || !layer) return;
  var cr = canvas.getBoundingClientRect();
  if(!cr.width) return;
  var DIRS = {parent:{dx:0,dy:1}, child:{dx:0,dy:-1}, sibling:{dx:1,dy:0}, spouse:{dx:-1,dy:0}};
  var STUB = 56;
  var lineHtml = "", buttons = [];
  Object.keys(famPendingArrows).forEach(function(nodeId){
    var flags = famPendingArrows[nodeId];
    if(!flags) return;
    var node = document.getElementById("famnode-"+nodeId);
    if(!node) return;
    var r = node.getBoundingClientRect();
    Object.keys(DIRS).forEach(function(dir){
      if(!flags[dir]) return;
      var d = DIRS[dir];
      var from = famRectEdgePoint(r, cr, d.dx, d.dy);
      var to = {x:from.x+d.dx*STUB, y:from.y+d.dy*STUB};
      lineHtml += '<line x1="'+from.x+'" y1="'+from.y+'" x2="'+to.x+'" y2="'+to.y+'" class="fam-line-pending" marker-end="url(#famArrowPending)"/>';
      buttons.push('<button type="button" class="fam-pending-btn" style="left:'+(to.x-11)+'px; top:'+(to.y-11)+'px;" onclick="confirmFamArrow(\''+nodeId+'\',\''+dir+'\')" title="点这里生成">+</button>');
    });
  });
  svg.insertAdjacentHTML("beforeend", '<g id="famPendingLinesGroup">'+lineHtml+'</g>');
  layer.innerHTML = buttons.join('');
}
/* 方框右下角可以拖拽改大小（原生 CSS resize），改完记住宽高，下次渲染继续用这个尺寸 */
var __famResizeObservers = [];
function setupFamilyNodeResize(){
  if(typeof ResizeObserver === "undefined") return;
  __famResizeObservers.forEach(function(ro){ ro.disconnect(); });
  __famResizeObservers = [];
  document.querySelectorAll(".fam-node").forEach(function(node){
    var id = node.id.replace("famnode-","");
    var ro = new ResizeObserver(function(){
      var p = (DATA.familyMembers||[]).filter(function(x){return x.id===id;})[0];
      if(!p) return;
      var w = Math.round(node.offsetWidth), h = Math.round(node.offsetHeight);
      if(p.w===w && p.h===h) return;
      p.w = w; p.h = h;
      clearTimeout(node.__famSaveTimer);
      node.__famSaveTimer = setTimeout(function(){ save(); }, 400);
      drawFamilyLines();
      renderPendingArrows();
    });
    ro.observe(node);
    __famResizeObservers.push(ro);
  });
}

/* 灵活识别各种写法的日期，比如 97/6/10、1997-6-10、2024年3月、19970610、2024，
   统一换算成 {y,m,d,precision} 用来排序和按年分组；识别不了就返回 null（这条经历会被归到"未知年份"，排在最后，不会丢） */
function normYear(y){
  y = parseInt(y,10);
  if(isNaN(y)) return null;
  if(y<100){ y = (y<=30) ? 2000+y : 1900+y; }
  return y;
}
function parseFlexibleDate(str){
  if(!str) return null;
  var s = String(str).trim();
  var m;
  m = /^(\d{2,4})\s*年\s*(\d{1,2})?\s*月?\s*(\d{1,2})?\s*日?$/.exec(s);
  if(m && m[1]){
    var y=normYear(m[1]); if(y===null) return null;
    return {y:y, m:m[2]?parseInt(m[2],10):1, d:m[3]?parseInt(m[3],10):1, precision:m[3]?"day":(m[2]?"month":"year")};
  }
  m = /^(\d{1,4})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{1,2}))?$/.exec(s);
  if(m){
    var y=normYear(m[1]); if(y===null) return null;
    return {y:y, m:parseInt(m[2],10), d:m[3]?parseInt(m[3],10):1, precision:m[3]?"day":"month"};
  }
  m = /^(\d{4})(\d{2})(\d{2})$/.exec(s);
  if(m) return {y:parseInt(m[1],10), m:parseInt(m[2],10), d:parseInt(m[3],10), precision:"day"};
  m = /^(\d{4})(\d{2})$/.exec(s);
  if(m) return {y:parseInt(m[1],10), m:parseInt(m[2],10), d:1, precision:"month"};
  m = /^(\d{4})$/.exec(s);
  if(m) return {y:parseInt(m[1],10), m:1, d:1, precision:"year"};
  var t = Date.parse(s);
  if(!isNaN(t)){ var dt=new Date(t); return {y:dt.getFullYear(), m:dt.getMonth()+1, d:dt.getDate(), precision:"day"}; }
  return null;
}
function pad2(n){ n=String(n); return n.length<2 ? "0"+n : n; }
function dateSortKey(str){
  var p = parseFlexibleDate(str);
  if(!p) return "99999999";
  return String(p.y)+pad2(p.m)+pad2(p.d);
}
/* 提交时把各种写法统一归成"年/月/日"中文格式，识别不了就原样保留（不耽误提交） */
function normalizeDateInput(str){
  var p = parseFlexibleDate(str);
  if(!p) return str;
  if(p.precision==="year") return p.y+"年";
  if(p.precision==="month") return p.y+"年"+p.m+"月";
  return p.y+"年"+p.m+"月"+p.d+"日";
}

/* "工作"类别下的固定标签：兼职/正职/实习，各自带一个颜色，选了之后时间轴上的括弧框/圆点就用这个颜色，不用类别本身的颜色 */
function workTag(key){ return (DATA.workTags||[]).filter(function(w){return w.key===key;})[0] || null; }
function residenceTag(key){ return (DATA.residenceTags||[]).filter(function(w){return w.key===key;})[0] || null; }
function timelineEntryColor(t){
  if((t.category||"")==="work" && t.jobType){
    var w = workTag(t.jobType);
    if(w) return w.color;
  }
  if((t.category||"")==="residence" && t.residenceType){
    var r = residenceTag(t.residenceType);
    if(r) return r.color;
  }
  return tlCategory(t.category||"other").color;
}
/* 住所的固定/移动已经靠上下两行区分了，行内颜色就不用再统一成标签色——
   改成按每条经历自己的 id 算一个稳定的颜色（同一条经历每次刷新颜色不变），
   这样同一行里哪怕好几段重叠在一起，也能靠颜色分清楚是哪一段 */
function colorForResidenceEntry(t){
  var s = String(t.id||"");
  var hash = 0;
  for(var i=0;i<s.length;i++){ hash = (hash*31 + s.charCodeAt(i)) >>> 0; }
  return CATEGORY_COLOR_PALETTE[hash % CATEGORY_COLOR_PALETTE.length];
}

/* 悬浮提示统一挂在 body 上用 position:fixed 显示，不受时间轴滚动容器裁剪影响 */
document.addEventListener("mouseover", function(e){
  var el = e.target.closest ? e.target.closest(".tl-tip-wrap.has-tip") : null;
  if(!el) return;
  var tip = document.getElementById("tlTooltip");
  if(!tip) return;
  tip.innerHTML = el.getAttribute("data-tip")||"";
  tip.style.display = "block";
  var r = el.getBoundingClientRect();
  var tr = tip.getBoundingClientRect();
  var left = Math.max(4, Math.min(r.left + r.width/2 - tr.width/2, window.innerWidth - tr.width - 4));
  var top = r.top - tr.height - 8;
  if(top < 4){ top = r.bottom + 8; }
  tip.style.left = left+"px";
  tip.style.top = top+"px";
});
document.addEventListener("mouseout", function(e){
  var el = e.target.closest ? e.target.closest(".tl-tip-wrap.has-tip") : null;
  if(!el) return;
  if(e.relatedTarget && el.contains(e.relatedTarget)) return;
  var tip = document.getElementById("tlTooltip");
  if(tip) tip.style.display = "none";
});

function groupTimelineByYear(items){

  });

/* 时间轴颗粒度：把日期换算成分组用的 key（年："2024"；月："2024-03"），以及对应的排序键和显示文字 */
function timeUnitKey(dateStr, granularity){
  var p = parseFlexibleDate(dateStr);
  if(!p) return "未知";
  return granularity==="month" ? (String(p.y)+"-"+pad2(p.m)) : String(p.y);
}
function timeUnitSortKey(key){
  if(key==="未知") return 999999999;
  var parts = key.split("-");
  var y = parseInt(parts[0],10);
  var m = parts[1] ? parseInt(parts[1],10) : 0;
  return y*100+m;
}
/* 换算成连续的"年"数值（比如 2020-03 -> 2020.1666），用来把横向时间轴改成真正按比例尺画，
   而不是按"用到的年份"顺序均匀排列——这样中间空掉的年份，间距也会正确地拉开 */
function timeUnitNumeric(key){
  if(key==="未知") return null;
  var parts = key.split("-");
  var y = parseInt(parts[0],10);
  var m = parts[1] ? parseInt(parts[1],10) : 1;
  return y + (m-1)/12;
}
function timeUnitLabel(key){
  if(key==="未知") return "未知";
  var parts = key.split("-");
  return parts[1] ? (parts[0]+"年"+parseInt(parts[1],10)+"月") : parts[0];
}
/* 把经历拆成"某个时间点"和"一段时间段"（填了结束时间的），并算出一份包含所有相关时间单位、按真实时间先后排序的轴，
   时间段的起止单位哪怕自己没有其他经历，也会在轴上占个位置，用来拉括弧 */
function buildTimelineLayout(items, granularity, allowPeriods){
  granularity = granularity || "year";
  var pointItems = [], periodItems = [];
  items.forEach(function(t){
    var pEnd = (allowPeriods && t.dateEnd) ? parseFlexibleDate(t.dateEnd) : null;
    if(pEnd){ periodItems.push(t); } else { pointItems.push(t); }
  });
  var yearGroups = {}, yearSet = {};
  pointItems.forEach(function(t){
    var yKey = timeUnitKey(t.date, granularity);
    yearGroups[yKey] = yearGroups[yKey] || [];
    yearGroups[yKey].push(t);
    yearSet[yKey] = true;
  });
  periodItems.forEach(function(t){
    var y1 = timeUnitKey(t.date, granularity), y2 = timeUnitKey(t.dateEnd, granularity);
    yearSet[y1]=true; yearSet[y2]=true;
    yearGroups[y1] = yearGroups[y1] || [];
    yearGroups[y2] = yearGroups[y2] || [];
  });
  var yearOrder = Object.keys(yearSet).sort(function(a,b){ return timeUnitSortKey(a)-timeUnitSortKey(b); });
  var yearIndex = {};
  yearOrder.forEach(function(yk,i){ yearIndex[yk]=i; });
  return {yearGroups:yearGroups, yearOrder:yearOrder, yearIndex:yearIndex, periodItems:periodItems};
}

  var attrs = directClick ? (' onclick="openTimelineEntry(\''+t.id+'\')"') : (' data-id="'+t.id+'"');

function renderTimelineAxisHorizontal(yearGroups, yearOrder, periodItems, yearIndex, granularity){
  var maxLeaves = 0;
  yearOrder.forEach(function(yk){ if(expandedYears[yk]) maxLeaves = Math.max(maxLeaves, (yearGroups[yk]||[]).length); });

  /* 横坐标完全按真实时间比例尺来画（连续数值），不是按"用到的年份"顺序均匀摆——中间跳过的年份，
     间距也会正确地拉开，柱状图的宽度真实反映时长。日期认不出来的（"未知"）依次排在最右边。 */
  var unitsPerYear = granularity==="month" ? 12 : 1;
  var numericByKey = {};
  yearOrder.forEach(function(yk){ numericByKey[yk] = timeUnitNumeric(yk); });
  var knownNumerics = yearOrder.map(function(yk){ return numericByKey[yk]; }).filter(function(n){ return n!==null; });
  var minNumeric = knownNumerics.length ? Math.min.apply(Math, knownNumerics) : 0;
  var xByKey = {}, maxKnownX = 40;
  yearOrder.forEach(function(yk){
    var n = numericByKey[yk];
    if(n===null) return;
    var x = 40 + (n - minNumeric) * unitsPerYear * HZ_SPACING;
    xByKey[yk] = x;
    maxKnownX = Math.max(maxKnownX, x);
  });
  yearOrder.forEach(function(yk){
    if(xByKey[yk]===undefined){ maxKnownX += HZ_SPACING; xByKey[yk] = maxKnownX; }
  });

  /* "住所"类别（固定/移动）严格锁死两行——轴线上方一行放固定住所（颜色调淡)、下方一行放移动住所（颜色正常），
     同一行里哪怕还有重叠，也直接挤在一起，绝不会再冒出第三行。
     "工作"（含合并进来的"学校"）等其它类别维持原来的规则不变：挤在一起、时间重叠的经历自动分两行摆放
     （贪心区间调度），短的那段经历优先占额外的上面一行，长的留在基准行。
     年份点在最下面，轴线到年份点之间用一条淡淡的竖线连一下，看得出对应关系。 */
  var ROW_H = 30;
  var periodMeta = (periodItems||[]).map(function(t){
    var y1 = timeUnitKey(t.date, granularity), y2 = timeUnitKey(t.dateEnd, granularity);
    if(xByKey[y1]===undefined || xByKey[y2]===undefined) return null;
    var x1 = Math.min(xByKey[y1], xByKey[y2]), x2raw = Math.max(xByKey[y1], xByKey[y2]);
    var width = Math.max(x2raw-x1, 30);
    return {t:t, x1:x1, x2:x1+width, width:width, lane:0};
  }).filter(Boolean);
  var isMobileResidence = function(m){ return m.t.category==="residence" && m.t.residenceType==="mobile"; };
  /* 固定住所（含未打标签的住所）钉在轴线下方一行；移动住所钉在轴线上方一行，
     都不走"重叠自动分两行"那套逻辑，否则一重叠就会多出一行 */
  var isFixedResidence = function(m){ return m.t.category==="residence" && !isMobileResidence(m); };
  var belowMeta = periodMeta.filter(isFixedResidence);
  var aboveMeta = periodMeta.filter(function(m){ return !isFixedResidence(m); });
  var aboveOther = aboveMeta.filter(function(m){ return !isMobileResidence(m); });
  var aboveOtherMaxLane = aboveOther.length ? packLanesWithOverflow(aboveOther) : 0;
  var aboveHeight = aboveMeta.length ? (aboveOtherMaxLane+1)*ROW_H : 0;
  var belowHeight = belowMeta.length ? ROW_H : 0;

  var axisTop = aboveHeight + 6;
  var belowZoneTop = axisTop + (belowMeta.length ? 10 : 0);
  var yearTop = belowZoneTop + belowHeight + (belowMeta.length ? 10 : 0);

  var connectors = yearOrder.map(function(yk){
    return '<div class="hz-year-connector" style="left:'+xByKey[yk]+'px; top:'+axisTop+'px; height:'+Math.max(yearTop-axisTop,0)+'px;"></div>';
  }).join('');

  var nodes = yearOrder.map(function(yk){

    var branches = "";
    if(isOpen && group.length){
      var leaves = group.map(function(t){ return timelineLeafHtml(t,"hz-leaf"); }).join('');
      branches = '<div class="hz-year-branches">'+leaves+'</div>';
    }
    var badge = group.length ? ('<span class="hz-year-count">'+group.length+'</span>') : '';
    return '<div class="hz-point'+(isOpen?" open":"")+'" data-year="'+esc(yk)+'" style="left:'+xByKey[yk]+'px; top:'+yearTop+'px" title="点击'+(isOpen?"收起":"展开")+'">'+
      '<div class="hz-dot hz-year-dot"></div>'+
      '<div class="hz-date hz-year-label">'+esc(timeUnitLabel(yk))+badge+'</div>'+
      branches+
    '</div>';
  }).join('');

  var addLeft = maxKnownX+HZ_SPACING;
  nodes += '<div class="hz-point add" data-id="__add__" style="left:'+addLeft+'px; top:'+yearTop+'px" title="添加经历">'+
    '<div class="hz-dot hz-dot-add">+</div><div class="hz-date">添加</div></div>';

  var aboveBrackets = aboveMeta.map(function(m){
    var t = m.t;
    var isMobile = isMobileResidence(m);
    var fillClass = (t.category==="work"||t.category==="residence") ? " tl-period-fill" : "";
    var top = 4 + m.lane*ROW_H;
    var color = isMobile ? colorForResidenceEntry(t) : timelineEntryColor(t);
    return '<div class="tl-period'+fillClass+'" data-id="'+t.id+'" style="left:'+m.x1+'px; width:'+m.width+'px; top:'+top+'px; --period-color:'+color+'" title="'+esc(t.date)+' ~ '+esc(t.dateEnd)+'">'+
      '<div class="tl-period-bracket"></div>'+
      '<div class="tl-period-label">'+keywordWithTip(t.keyword||"时间段", t)+'</div>'+
    '</div>';
  }).join('');
  var belowBrackets = belowMeta.map(function(m){
    var t = m.t;
    var top = belowZoneTop + m.lane*ROW_H;
    var color = colorForResidenceEntry(t);
    return '<div class="tl-period tl-period-fill tl-period-soft" data-id="'+t.id+'" style="left:'+m.x1+'px; width:'+m.width+'px; top:'+top+'px; --period-color:'+color+'" title="'+esc(t.date)+' ~ '+esc(t.dateEnd)+'">'+
      '<div class="tl-period-bracket"></div>'+
      '<div class="tl-period-label">'+keywordWithTip(t.keyword||"时间段", t)+'</div>'+
    '</div>';
  }).join('');

  var trackWidth = Math.max(addLeft+40, 280);
  var containerHeight = yearTop + Math.max(60, 40 + maxLeaves*24 + 16);
  return '<div class="hz-timeline-wrap"><div class="hz-timeline" id="hzTimeline" style="height:'+containerHeight+'px">'+
    aboveBrackets+belowBrackets+connectors+
    '<div class="hz-line" style="width:'+trackWidth+'px; top:'+axisTop+'px"></div>'+nodes+
    '</div></div>';
}
